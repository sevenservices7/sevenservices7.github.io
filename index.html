function attemptLogin(){
  const emailEl=document.getElementById("login-email");
  const pwEl=document.getElementById("login-pw");
  const err=document.getElementById("login-err");
  const email=(emailEl?emailEl.value:"").trim();
  const pw=pwEl?pwEl.value:"";
  if(!email||!pw){if(err)err.textContent="Preenche todos os campos.";return;}
  if(err)err.textContent="A autenticar...";
  async function doFallbackLogin(){
    sessionStorage.clear();
    const u=Object.keys(USERS).find(k=>USERS[k].email===email||k===email.split("@")[0].toUpperCase());
    if(u){
      const user=USERS[u];
      const validPw=await verifyUserPassword(u,user,pw);
      if(validPw){
        currentUser={code:u,name:user.name,role:user.role,annexKey:user.annexKey||u,fn:user.fn||"",email:user.email||email};
        sessionStorage.setItem("seven_user",JSON.stringify(currentUser));
        role=user.role;loadUserReadPages();if(pwEl)pwEl.value="";showApp();return true;
      }
    }
    if(err)err.textContent="Email ou password incorrectos.";
    return false;
  }
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),5000);
  fetch(SB_URL+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"Content-Type":"application/json","apikey":SB_KEY},body:JSON.stringify({email:email,password:pw}),signal:controller.signal})
  .then(r=>{clearTimeout(timeout);return r.json().then(d=>({ok:r.ok,data:d}));})
  .then(async({ok,data})=>{
    if(ok&&data.access_token){
      try{
        sbStoreSession(data);
        const profRes=await fetch(SB_URL+"/rest/v1/profiles?id=eq."+data.user.id,{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+data.access_token}});
        const profs=await profRes.json();
        if(profs&&profs[0]){
          currentUser={code:profs[0].code,name:profs[0].name,role:profs[0].role,annexKey:profs[0].code,fn:profs[0].function_||"",unit:profs[0].unit||"",photo_url:profs[0].photo_url||"",email:profs[0].email||email};
          const permRes=await fetch(SB_URL+"/rest/v1/permissions?user_code=eq."+currentUser.code,{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+data.access_token}});
          currentPermissions=(await permRes.json())||[];
          sessionStorage.setItem("seven_user",JSON.stringify(currentUser));
          sessionStorage.setItem("seven_perms",JSON.stringify(currentPermissions));
          role=currentUser.role;loadUserReadPages();await loadCompanyData().catch(()=>{});Promise.all([loadFeedback(),loadRequests(),loadSuggestions(),loadTasks(),loadNotifications(),loadManualOverrides(),loadProfiles(),loadRevenueHistory(),loadAiAgents(),loadAiContextDocs(),loadDocTemplates(),loadDocsIssued()]).catch(()=>{}).finally(()=>{renderNotifBell();render();});if(pwEl)pwEl.value="";showApp();return;
        }
      }catch(e2){console.warn("[AUTH] Profile fetch failed:",e2.message);}
    }
    sbClearSession();
    doFallbackLogin();
  })
  .catch(e=>{clearTimeout(timeout);console.warn("[AUTH] Supabase unreachable:",e.message);doFallbackLogin();});
}

  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},250);
  toast("✓ "+filename+" descarregado");
}

        if(s.answered){
          if(correct){bg="rgba(16,185,129,.22)";border="#10B981";color="#D1FAE5";}
          else if(sel&&!correct){bg="rgba(239,68,68,.22)";border="#EF4444";color="#FEE2E2";}
        } else if(sel){bg="rgba(241,196,107,.18)";border="#F1C46B";}
        const circleBorder=s.answered&&correct?"#10B981":(s.answered&&sel?"#EF4444":"rgba(255,255,255,.35)");

        <div style="font-weight:700;margin-bottom:${isCorrect?"0":"6px"}">${isCorrect?"✅ Correcto!":`❌ Resposta errada (tentativa ${s.attempts} de 3)`}</div>

          : failed

function answerQuizOverlay(optIdx){
  const s=quizOverlay;if(!s.active||s.answered)return;
  s.selected=optIdx;s.answered=true;
  const q=s.questions[s.idx];const correct=optIdx===q.correct;
  if(!correct)s.attempts+=1;
  s.answers.push({q_idx:s.idx,selected:optIdx,correct:correct,attempt:s.attempts});
  if(correct)s.score+=1;
  renderQuizOverlay();
}
function retryQuizOverlay(){
  const s=quizOverlay;s.answered=false;s.selected=-1;
  renderQuizOverlay();
}
function nextQuizOverlay(){
  const s=quizOverlay;s.idx+=1;s.answered=false;s.selected=-1;s.attempts=0;
  if(s.idx>=s.questions.length){completeQuizOverlay();return;}
  renderQuizOverlay();
}
async function saveQuizAttempt(abandoned,passed){
  if(!currentUser||!sbConnected)return;
  const s=quizOverlay;
  try{
    await SB.post("quiz_attempts",{
      user_code:currentUser.code,
      page_key:s.pid,
      passed:!!passed,
      score:s.score,
      total:s.questions.length,
      answers:s.answers,
      attempt_num:1,
      abandoned:!!abandoned
    });
  }catch(e){}
}
async function completeQuizOverlay(){
  const s=quizOverlay;
  if(!s.finalSaved){s.finalSaved=true;await saveQuizAttempt(false,true);}
  if(currentUser){
    if(!readPages.includes(s.pid))readPages.push(s.pid);
    persistReadPages();
    saveQuizDone(s.pid);
    sbMarkRead(currentUser.code,s.pid,true);
  }
  closeQuizOverlay(true);
}
function failQuizOverlay(){
  const s=quizOverlay;

  closeQuizOverlay(false);
}
function closeQuizOverlay(completed){

}

function tutorialEmbed(url){
  const u=(url||"").trim();
  if(!u)return null;
  // YouTube
  let m=u.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/|v\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/);
  if(m){const id=m[1];return {kind:"iframe",src:"https://www.youtube.com/embed/"+id,label:"YouTube"};}
  // Loom
  m=u.match(/loom\.com\/(?:share|embed)\/([A-Za-z0-9]+)/);
  if(m){const id=m[1];return {kind:"iframe",src:"https://www.loom.com/embed/"+id,label:"Loom"};}
  return {kind:"link",src:u,label:"Abrir tutorial"};
}

function pdfGoldBar(doc,y,h,pageW){
  const steps=Math.max(Math.round(h*4),6);const sh=h/steps;
  for(let i=0;i<steps;i++){
    const t=i/steps;const r=Math.round(251-67*t);const g=Math.round(214-63*t);const b=Math.round(126-76*t);
    doc.setFillColor(r,g,b);doc.rect(0,y+i*sh,pageW,sh+0.1,"F");
  }
}

  saveSvcFull(f.code,f);
  if(svcFormNew){addCustomSvc(f);}
  if(f.price!==oldPrice&&oldPrice!==null&&currentUser){sbLogPrice(f.code,oldPrice,f.price,currentUser.code);}
  await sbSaveService(f);
  svcFormData=null;svcFormNew=false;page="manage";renderSide();render();
  toast(publish?"✓ Serviço publicado para a equipa":"✓ Rascunho guardado");
}

function updCalc(f,v){calcForm[f]=typeof v==="string"&&!isNaN(v)?parseFloat(v):v;render();}
function calcResult(){
  const f=calcForm;
  const custoBase=f.horas*f.custoHora+f.taxas+f.aquisicao;
  const factores=CALC_DIFF[f.dif].m*CALC_URG[f.urg].m*CALC_RISK[f.risk].m*CALC_VOL[f.vol].m;
  const comAjustes=custoBase*factores;
  const breakEven=comAjustes;
  const comMargem=comAjustes*(1+f.margem/100);
  const arredondado=Math.ceil(comMargem/5)*5;
  return{custoBase,factores,comAjustes,breakEven,comMargem,arredondado};
}

function computeCurrentMonthRevenue(){
  const now=new Date();const y=now.getFullYear();const m=now.getMonth()+1;
  const rows=sbRevenueHistory.filter(r=>r.year===y&&r.month===m);
  const byUnit={};METRIC_UNITS.forEach(u=>byUnit[u]=0);
  rows.forEach(r=>{if(byUnit[r.unit]!=null)byUnit[r.unit]+=parseFloat(r.revenue)||0;});
  const total=selectedUnit==="all"?METRIC_UNITS.reduce((s,u)=>s+byUnit[u],0):(byUnit[selectedUnit]||0);
  return {byUnit:byUnit,total:total,year:y,month:m};
}
function computePrevMonthRevenue(){
  const now=new Date();const d=new Date(now.getFullYear(),now.getMonth()-1,1);
  return sumRevenueForUnit(d.getFullYear(),d.getMonth()+1,selectedUnit);
}
function computeSameMonthLastYearRevenue(){
  const now=new Date();const d=new Date(now.getFullYear()-1,now.getMonth(),1);
  return sumRevenueForUnit(d.getFullYear(),d.getMonth()+1,selectedUnit);
}
function sumRevenueFor(year,month){
  const rows=sbRevenueHistory.filter(r=>r.year===year&&r.month===month);
  return rows.reduce((s,r)=>s+(parseFloat(r.revenue)||0),0);
}
function sumLeadsFor(year,month,field){
  const rows=sbRevenueHistory.filter(r=>r.year===year&&r.month===month);
  return rows.reduce((s,r)=>s+(parseInt(r[field])||0),0);
}

function unitLabel(u){return u==="all"?"Todas as unidades":u;}
function sumRevenueForUnit(year,month,unit){
  if(!unit||unit==="all")return sumRevenueFor(year,month);
  const r=sbRevenueHistory.find(x=>x.year===year&&x.month===month&&x.unit===unit);
  return r?(parseFloat(r.revenue)||0):0;
}
function sumLeadsForUnit(year,month,unit,field){
  if(!unit||unit==="all")return sumLeadsFor(year,month,field);
  const r=sbRevenueHistory.find(x=>x.year===year&&x.month===month&&x.unit===unit);
  return r?(parseInt(r[field])||0):0;
}
function getGoalsForSelection(){
  if(!selectedUnit||selectedUnit==="all")return getCompanyGoals();
  const ug=getUnitGoals();const u=ug[selectedUnit];
  return {break_even:u.be,minima:u.min,operacional:u.op,byUnit:ug};
}
function getOpGoalsForSelection(){
  const ug=getUnitOpGoals();
  if(!selectedUnit||selectedUnit==="all"){
    return {leads:METRIC_UNITS.reduce((s,u)=>s+ug[u].leads,0),closed:METRIC_UNITS.reduce((s,u)=>s+ug[u].closed,0)};
  }
  const u=ug[selectedUnit];return {leads:u.leads,closed:u.closed};
}
function computeCurrentMonthOps(){
  const now=new Date();const y=now.getFullYear();const m=now.getMonth()+1;
  return {leads:sumLeadsForUnit(y,m,selectedUnit,"leads_in"),closed:sumLeadsForUnit(y,m,selectedUnit,"leads_closed"),year:y,month:m};
}
function renderFinancialHealth(mockTotalRev,cg){

  }

    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--t2)">
      <div><strong>vs mês anterior:</strong> <span style="color:${deltaColor(vsPrevN)};font-weight:700">${arrow(vsPrevN)} ${vsPrev}</span> ${prev?`(€${prev.toLocaleString("pt-PT")})`:""}</div>
      <div><strong>vs mesmo mês ano anterior:</strong> <span style="color:${deltaColor(vsPrevYrN)};font-weight:700">${arrow(vsPrevYrN)} ${vsPrevYr}</span> ${prevYear?`(€${prevYear.toLocaleString("pt-PT")})`:""}</div>

function getRevenueCell(year,month,unit,field){
  const r=sbRevenueHistory.find(x=>x.year===year&&x.month===month&&x.unit===unit);
  if(!r)return "";const v=r[field];return v==null||v===""?"":String(v);
}
function onRevenueCellChange(year,month,unit,field,val){
  const num=(field==="num_services"||field==="leads_in"||field==="leads_closed")?(parseInt(val)||0):(parseFloat(val)||0);
  upsertRevenueHistory(year,month,unit,{[field]:num}).then(()=>render());
}

function renderRevenueChart(year){
  const months=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const values=months.map((_,i)=>sumRevenueForUnit(year,i+1,selectedUnit));
  const cg=getGoalsForSelection();
  const be=cg.break_even,minima=cg.minima,opMeta=cg.operacional;
  const scopeLbl=selectedUnit==="all"?"todas as unidades":selectedUnit;
  const dataMax=Math.max(0,...values);
  const targetsMax=Math.max(be,minima,opMeta);
  const chartMax=Math.max(1,Math.max(dataMax,targetsMax)*1.1);
  const H=220;
  const fmtEUR=v=>"€"+Math.round(v).toLocaleString("pt-PT");
  const kFmt=v=>v>=1000?"€"+Math.round(v/1000)+"k":"€"+Math.round(v);
  const colorFor=v=>{if(v>=opMeta&&opMeta>0)return "#10B981";if(v>=minima&&minima>0)return "#3B82F6";if(v>=be&&be>0)return "#F59E0B";return "#EF4444";};
  const refLine=(val,color,lbl)=>{
    if(!val||val<=0)return "";
    const bottomPx=Math.round(val/chartMax*H);
    return `<div style="position:absolute;left:0;right:0;bottom:${bottomPx}px;border-top:2px dashed ${color};pointer-events:none;z-index:1"><span style="position:absolute;right:4px;top:-9px;background:#fff;padding:0 4px;font-size:9px;font-weight:700;color:${color}">${lbl} ${kFmt(val)}</span></div>`;
  };
  const lines=refLine(be,"#EF4444","BE")+refLine(minima,"#F59E0B","Mín")+refLine(opMeta,"#10B981","Op");
  const legend=`<div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-size:10px;color:var(--t2)">
    <span style="display:flex;align-items:center;gap:5px"><span style="width:16px;height:0;border-top:2px dashed #EF4444"></span>Break-even</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:16px;height:0;border-top:2px dashed #F59E0B"></span>Meta mínima</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:16px;height:0;border-top:2px dashed #10B981"></span>Meta operacional</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:12px;background:#3B82F6;border-radius:2px"></span>Receita mensal</span>
  </div>`;
  return `<div class="card"><div class="ctit" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px"><span>Gráfico — ${year} <span style="font-size:10px;font-weight:500;color:var(--t2);text-transform:none;letter-spacing:0;margin-left:6px">(${esc(scopeLbl)})</span></span>${legend}</div>
    <div style="padding:8px 4px 0 4px">
      <div style="position:relative;height:${H}px">${lines}<div style="position:absolute;inset:0;display:flex;gap:6px;align-items:flex-end">${values.map((v,i)=>{const h=Math.round(v/chartMax*H);const color=colorFor(v);const tip=`${months[i]} ${year}\nReceita: ${fmtEUR(v)}\nBreak-even: ${fmtEUR(be)}  ${v>=be?"✓":"✗"}\nMeta mínima: ${fmtEUR(minima)}  ${v>=minima?"✓":"✗"}\nMeta operacional: ${fmtEUR(opMeta)}  ${v>=opMeta?"✓":"✗"}`;return `<div style="flex:1;display:flex;justify-content:center;align-items:flex-end;min-width:0;position:relative;z-index:2"><div style="width:100%;max-width:42px;height:${h}px;background:${color};border-radius:4px 4px 0 0;transition:height .3s" title="${esc(tip)}"></div></div>`;}).join("")}</div></div>
      <div style="display:flex;gap:6px;margin-top:4px">${values.map((v,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;min-width:0"><div style="font-size:10px;color:var(--t2)">${months[i]}</div><div style="font-size:10px;color:var(--t3);font-weight:600;height:14px">${v?kFmt(v):""}</div></div>`).join("")}</div>
    </div>
    <div style="font-size:10px;color:var(--t3);margin-top:6px;font-style:italic">Cor da barra: vermelho (abaixo do break-even), amarelo (acima do BE), azul (acima da meta mín.), verde (acima da meta operacional). Passa o rato sobre a barra para detalhes.</div>
  </div>`;
}
let settingsTab="empresa";
let empresaEditField=null,empresaEditBuffer="",letterheadUploading="";
async function uploadLetterhead(prefix){
  if(!isAdminUser()){toast("Apenas admin");return;}
  if(!sbConnected){toast("Supabase indisponível");return;}
  const inp=document.getElementById("lh-input-"+prefix);
  if(!inp||!inp.files||!inp.files[0]){toast("Escolhe um PDF");return;}
  const file=inp.files[0];
  if(!file.name.toLowerCase().endsWith(".pdf")){toast("Só PDFs");return;}
  if(file.size>5*1024*1024){toast("Máx 5MB");return;}
  letterheadUploading=prefix;render();
  try{
    const fileName="letterhead-"+prefix+".pdf";
    const upUrl=SB_URL+"/storage/v1/object/letterheads/"+fileName;
    const r=await fetch(upUrl,{method:"POST",headers:sbHeaders({"Content-Type":"application/pdf","x-upsert":"true"}),body:file});
    if(!r.ok){
      const d=await r.text().catch(()=>"");
      throw new Error("Upload falhou ("+r.status+"): "+d.slice(0,140));
    }
    const publicUrl=SB_URL+"/storage/v1/object/public/letterheads/"+fileName;
    await saveSetting("letterhead_"+prefix+"_url",publicUrl);
    toast("✓ "+fileName+" carregado");
  }catch(e){toast("Erro: "+e.message);}
  letterheadUploading="";render();
}
async function removeLetterhead(prefix){
  if(!isAdminUser()){toast("Apenas admin");return;}
  if(!confirm("Remover papel timbrado?"))return;
  try{
    const fileName="letterhead-"+prefix+".pdf";
    await fetch(SB_URL+"/storage/v1/object/letterheads/"+fileName,{method:"DELETE",headers:sbHeaders()}).catch(()=>{});

async function saveSetting(key,val){
  sbCompanySettings[key]=val;
  try{
    const r=await fetch(SB_URL+"/rest/v1/company_settings?on_conflict=key_",{method:"POST",headers:sbHeaders({"Prefer":"return=representation,resolution=merge-duplicates"}),body:JSON.stringify([{key_:key,value_:val,updated_by:currentUser?currentUser.code:""}])});
    if(!r.ok){const txt=await r.text();throw new Error(txt||r.status);}
    toast("Guardado");
  }catch(e){toast("Erro: "+e.message);}
}

async function uploadAvatar(file,userCode){
  if(!file)return null;
  if(file.size>5*1024*1024){toast("Ficheiro demasiado grande (máx 5MB)");return null;}
  if(!file.type.startsWith("image/")){toast("Usa uma imagem (JPG, PNG, WebP)");return null;}
  let token=sbValidToken();if(!token)token=await sbRefreshSession();
  const ext=file.name.split(".").pop();
  const filename=userCode+"_"+Date.now()+"."+ext;
  try{
    const res=await fetch(SB_URL+"/storage/v1/object/avatars/"+filename,{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+(token||SB_KEY),"Content-Type":file.type},body:file});
    if(!res.ok){toast("Erro no upload");return null;}
    const photoUrl=SB_URL+"/storage/v1/object/public/avatars/"+filename;
    await SB.patch("profiles","code=eq."+userCode,{photo_url:photoUrl});
    toast("✓ Foto actualizada");return photoUrl;
  }catch(e){toast("Erro: "+e.message);return null;}
}

      <div><label style="${lbl}">Estado</label><select style="${inp}" onchange="updSvcForm('status',this.value)"><option value="active" ${f.status==="active"?"selected":""}>✅ Activo</option><option value="draft" ${f.status==="draft"?"selected":""}>📝 Rascunho</option><option value="inactive" ${f.status==="inactive"?"selected":""}>⛔ Inactivo</option></select></div>
      <div><label style="${lbl}">Requer Procuração</label><select style="${inp}" onchange="updSvcForm('needs_proc',this.value==='true')"><option value="false" ${!f.needs_proc?"selected":""}>Não</option><option value="true" ${f.needs_proc?"selected":""}>Sim</option></select></div>
      <div><label style="${lbl}">Requer Contrato</label><select style="${inp}" onchange="updSvcForm('needs_cont',this.value==='true')"><option value="false" ${!f.needs_cont?"selected":""}>Não</option><option value="true" ${f.needs_cont?"selected":""}>Sim</option></select></div>

    </div>`;
  }
  const navBtns=`<div style="display:flex;justify-content:space-between;margin-top:22px;flex-wrap:wrap;gap:10px">${step>1?`<button class="cb cb-light" onclick="svcFormStep--;render()">◀ Anterior</button>`:'<div></div>'}<div style="display:flex;gap:10px">${step<5?`<button class="cb cb-dark" style="padding:12px 24px" onclick="svcFormStep++;render()">Seguinte ▶</button>`:`<button class="cb cb-light" onclick="saveSvcForm(false)">💾 Guardar rascunho</button><button class="cb cb-dark" style="padding:12px 24px" onclick="saveSvcForm(true)">✅ Publicar para a equipa</button>`}</div></div>`;
  return`<div style="padding:28px 32px;max-width:860px">${pageHeader(isNew?"➕":"✏️",isNew?"Novo Serviço":"Editar — "+f.code,isNew?"Preencha os dados e publique quando pronto.":"Altere os campos e publique.")}${stepBar}${content}${navBtns}</div>`;
}

function generateFeedbackPDF(){
  if(typeof window.jspdf==="undefined"&&typeof jspdf==="undefined"){toast("A carregar biblioteca PDF...");const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js";s.onload=()=>setTimeout(generateFeedbackPDF,200);document.head.appendChild(s);return;}
  try{
    const{jsPDF}=window.jspdf||jspdf;
    const entries=getFilteredFeedback();
    if(!entries.length){toast("Sem registos para exportar");return;}
    const users=getAllUsers();
    const userLbl=code=>{const u=users[code];return u?u.name+" ("+code+")":code;};
    const fl=feedbackFilter;
    const pageW=210;const pageH=297;const margin=22;const contentW=pageW-margin*2;
    const contentTop1=42;const contentTopN=18;const contentBottom=pageH-32;
    const doc=new jsPDF({unit:"mm",format:"a4"});
    let pageNum=1;
    pdfWatermark(doc,pageW,pageH);pdfHeader(doc,pageW,true);
    let y=contentTop1;
    doc.setFontSize(15);doc.setFont("helvetica","bold");doc.setTextColor(10,28,68);
    doc.text("Relatório de Feedback de Colaboradores",pageW/2,y,{align:"center"});y+=7;
    doc.setDrawColor(241,196,107);doc.setLineWidth(0.4);doc.line(margin,y,pageW-margin,y);y+=6;
    doc.setFontSize(9.5);doc.setFont("helvetica","normal");doc.setTextColor(90,100,115);
    const hoje=new Date().toLocaleDateString("pt-PT",{day:"2-digit",month:"long",year:"numeric"});
    const filtros=[];
    if(fl.user_code)filtros.push("Colaborador: "+userLbl(fl.user_code));
    if(fl.type){const tm=fbTypeMeta(fl.type);filtros.push("Tipo: "+tm[1]);}
    if(fl.from)filtros.push("De: "+fl.from);
    if(fl.to)filtros.push("Até: "+fl.to);
    doc.text("Gerado em: "+hoje+" · "+entries.length+" registo(s)",margin,y);y+=5;
    if(filtros.length){doc.text("Filtros: "+filtros.join(" · "),margin,y);y+=5;}
    doc.text("Responsável: "+(currentUser?currentUser.name:"-"),margin,y);y+=7;
    const ensureSpace=(h)=>{
      if(y+h>contentBottom){pdfFooter(doc,pageW,pageH,pageNum,1);doc.addPage();pageNum++;pdfWatermark(doc,pageW,pageH);pdfHeader(doc,pageW,false);y=contentTopN+4;}
    };
    entries.forEach((e,idx)=>{
      const tm=fbTypeMeta(e.type);const sm=fbSevMeta(e.severity||"normal");
      const dt=new Date(e.created_at);
      const dtLbl=dt.toLocaleDateString("pt-PT")+" "+dt.toLocaleTimeString("pt-PT",{hour:"2-digit",minute:"2-digit"});
      ensureSpace(30);
      doc.setFillColor(245,247,250);doc.rect(margin,y-1,contentW,8,"F");
      doc.setFontSize(10);doc.setFont("helvetica","bold");doc.setTextColor(10,28,68);
      doc.text("#"+(idx+1)+" · "+userLbl(e.user_code),margin+2,y+4.5);
      doc.setFont("helvetica","normal");doc.setTextColor(90,100,115);doc.setFontSize(8.5);
      doc.text(dtLbl,pageW-margin-2,y+4.5,{align:"right"});y+=11;
      doc.setFontSize(9);doc.setFont("helvetica","bold");doc.setTextColor(60,70,85);
      const meta="Tipo: "+tm[1]+"   ·   Severidade: "+sm[1]+(e.category?"   ·   Categoria: "+e.category:"");
      const metaLines=doc.splitTextToSize(meta,contentW);metaLines.forEach(l=>{ensureSpace(5);doc.text(l,margin,y);y+=4.5;});
      y+=1;
      doc.setFont("helvetica","normal");doc.setFontSize(9.5);doc.setTextColor(30,41,59);
      const descLines=doc.splitTextToSize(e.description||"",contentW);
      descLines.forEach(l=>{ensureSpace(5);doc.text(l,margin,y);y+=5;});
      if(e.context){
        y+=1;
        doc.setFont("helvetica","italic");doc.setFontSize(8.8);doc.setTextColor(90,100,115);
        const ctxLines=doc.splitTextToSize("Contexto: "+e.context,contentW);
        ctxLines.forEach(l=>{ensureSpace(4.5);doc.text(l,margin,y);y+=4.3;});
      }
      if(e.created_by){
        doc.setFont("helvetica","normal");doc.setFontSize(8);doc.setTextColor(140,150,165);
        ensureSpace(4);doc.text("Registado por: "+e.created_by,margin,y);y+=4;
      }
      y+=2;
      doc.setDrawColor(220,226,232);doc.setLineWidth(0.15);doc.line(margin,y,pageW-margin,y);y+=5;
    });
    const tp=doc.getNumberOfPages();
    for(let p=1;p<=tp;p++){doc.setPage(p);applyPageFooter(doc,lhPng,pageW,pageH,p,tp);}
    const suffix=fl.user_code?"_"+fl.user_code:"_Geral";
    doc.save("Feedback_SEVEN"+suffix+"_"+new Date().toISOString().slice(0,10)+".pdf");
    toast("✓ Relatório descarregado");
  }catch(e){toast("Erro: "+e.message);console.error(e);}
}

function migrateData(){
  const curV=localStorage.getItem("seven_data_version")||"";
  const targetV="v5b-2026-04";
  if(curV!==targetV){
    try{
      const old=JSON.parse(localStorage.getItem("seven_svcs")||"{}");
      const kept={};
      Object.keys(old).forEach(code=>{
        const base=SVCS.find(x=>x.code===code);
        if(!base){kept[code]=old[code];return;}
        const override=old[code]||{};
        const filtered={};
        Object.keys(override).forEach(field=>{
          const overrideVal=override[field];
          const sourceVal=base[field];
          if(Array.isArray(overrideVal)){if((sourceVal||[]).length===0)filtered[field]=overrideVal;}
          else if(typeof overrideVal==="string"){if(!sourceVal||sourceVal.length===0)filtered[field]=overrideVal;}
          else if(typeof overrideVal==="number"){if(sourceVal==null)filtered[field]=overrideVal;}
          else{filtered[field]=overrideVal;}
        });
        if(Object.keys(filtered).length>0)kept[code]=filtered;
      });
      localStorage.setItem("seven_svcs",JSON.stringify(kept));
      localStorage.setItem("seven_data_version",targetV);
      console.log("[SEVEN] Data migration v5b: removed stale overrides where source has updated content");
    }catch(e){console.warn("[SEVEN] Migration error:",e);}
  }
}
migrateData();

}
