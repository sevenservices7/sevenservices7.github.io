*{box-sizing:border-box;margin:0;padding:0}
:root{
  --n0:#071432;--n1:#0A1C44;--n2:#102D54;--n3:#1B3058;
  --g0:#B87832;--g1:#F1C46B;--g2:#D9974B;--g3:#FBDC9E;
  --off:#F5F6F8;--off2:#EEF0F0;--w:#fff;
  --b1:#E3E8EE;--b2:#D0D8E0;
  --t1:#1E293B;--t2:#5D7284;--t3:#8FA1B3;
  --ok:#1A7A4A;--warn:#D97706;--danger:#B91C1C;--info:#1D4ED8;
  --shadow-sm:0 1px 2px rgba(10,28,68,.06),0 1px 3px rgba(10,28,68,.04);
  --shadow-md:0 4px 12px rgba(10,28,68,.07),0 1px 3px rgba(10,28,68,.05);
  --shadow-lg:0 12px 32px rgba(10,28,68,.12),0 4px 8px rgba(10,28,68,.06);
  --shadow-xl:0 24px 60px rgba(10,28,68,.2),0 8px 16px rgba(10,28,68,.08);
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px
}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;background:var(--off);display:flex;flex-direction:column;font-size:14px;line-height:1.5;color:var(--t1);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.top-logo{height:52px;width:auto;display:block;flex-shrink:0;cursor:pointer}
.backoffice-tag{color:var(--g1);font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:3px 9px;border:1px solid rgba(241,196,107,.35);border-radius:6px;margin-left:2px}
.logo-svg{display:block;flex-shrink:0}
.logo-svg .l-s{stroke:#fff;fill:none;stroke-width:9;stroke-linecap:round;stroke-linejoin:round}
.logo-svg .l-7{fill:url(#lg-gold)}
.logo-svg.dark .l-s{stroke:var(--n1)}
.logo-mark-bg{background:var(--n1);border-radius:10px;padding:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(241,196,107,.22),0 2px 6px rgba(0,0,0,.18)}
.brand-full{display:flex;align-items:center;gap:14px}
.brand-wordmark{line-height:1}
.brand-super{font-size:9px;letter-spacing:.22em;color:var(--g1);font-weight:500;margin-bottom:4px}
.brand-seven{font-size:22px;letter-spacing:.04em;color:#fff;font-weight:900;line-height:.9}
.brand-services{font-size:10px;letter-spacing:.38em;color:var(--g1);font-weight:600;margin-top:3px}
.app{display:flex;flex-direction:column;height:100vh}
.top{background:linear-gradient(90deg,var(--n0) 0%,var(--n1) 100%);padding:0 22px;height:62px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(241,196,107,.25);flex-shrink:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.logo-sq{width:38px;height:38px;background:var(--g1);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:19px;color:var(--n2);font-family:Georgia,serif;flex-shrink:0}
.brand-col{line-height:1.15}
.brand-main{color:#fff;font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}
.brand-sub{color:var(--g1);font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.top-div{width:1px;height:26px;background:rgba(255,255,255,.14)}
.sys-lbl{color:rgba(255,255,255,.45);font-size:12px;letter-spacing:.06em;text-transform:uppercase;font-weight:500}
.role-sw{display:flex;gap:4px;align-items:center}
.rsw-lbl{color:rgba(255,255,255,.35);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-right:5px}
.role-btn{padding:6px 14px;border-radius:14px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.role-btn.on{background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 100%);color:var(--n1);box-shadow:0 2px 6px rgba(241,196,107,.3)}
.role-btn.off{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1)}
.role-btn.off:hover{background:rgba(255,255,255,.14);color:rgba(255,255,255,.75)}
.layout{display:flex;flex:1;overflow:hidden}
.side{width:220px;background:#0A1C44;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.nl{padding:16px 16px 4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.35);margin-top:4px}
.nl:first-child{margin-top:8px}
.nl.nl-blank{padding:10px 0 0}
.ni{display:flex;align-items:center;gap:10px;padding:9px 16px;margin:1px 8px;cursor:pointer;color:rgba(255,255,255,.75);font-size:13px;border-radius:6px;transition:background .15s,color .15s;user-select:none;font-weight:500}
.ni:hover{background:rgba(255,255,255,.08);color:#fff}
.ni.on{background:#F1C46B;color:#0A1C44;font-weight:700}
.ni.ni-isolated{margin-top:12px;margin-bottom:12px}
.nl.nl-admin{border-top:1px solid rgba(255,255,255,.1);margin:8px 0 0;padding-top:14px}
.ni-ico{display:none}
.nb{background:rgba(241,196,107,.18);color:#F1C46B;border-radius:10px;padding:1px 8px;font-size:10px;font-weight:700;margin-left:auto}
.ni.on .nb{background:rgba(10,28,68,.15);color:#0A1C44}
.sfooter{margin-top:auto;border-top:1px solid rgba(255,255,255,.08);padding:14px 16px;color:rgba(255,255,255,.55);font-size:12px;line-height:1.5}
.sfooter .su-name{font-size:13px;font-weight:600;color:rgba(255,255,255,.92);margin-bottom:2px}
.sfooter .su-unit{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:8px}
.sfooter .su-logout{background:none;border:none;color:rgba(255,255,255,.5);font-size:11px;font-family:inherit;cursor:pointer;padding:4px 0;text-decoration:none;transition:color .15s}
.sfooter .su-logout:hover{color:#fff;text-decoration:underline}
.ia-btn{width:100%;background:linear-gradient(135deg,var(--n1) 0%,var(--n2) 100%);color:var(--g1);border:1px solid rgba(241,196,107,.4);border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;justify-content:center;letter-spacing:.05em;transition:all .2s;box-shadow:0 2px 8px rgba(10,28,68,.15)}
.ia-btn:hover{background:linear-gradient(135deg,var(--n2) 0%,var(--n3) 100%);transform:translateY(-1px);box-shadow:0 4px 12px rgba(10,28,68,.22)}
.main{flex:1;overflow-y:auto;position:relative}
.hero{background:linear-gradient(135deg,var(--n0) 0%,var(--n1) 55%,var(--n2) 100%);padding:32px 28px 26px;border-bottom:2px solid rgba(241,196,107,.22);flex-shrink:0;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-40%;right:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(241,196,107,.08) 0%,transparent 70%);pointer-events:none}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.h-greet{color:rgba(255,255,255,.55);font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.h-name{color:#fff;font-size:22px;font-weight:700;margin-top:3px;letter-spacing:-.01em}
.h-stats{display:flex;gap:22px}
.hstat-v{color:var(--g1);font-size:22px;font-weight:700;line-height:1;text-align:right}
.hstat-l{color:rgba(255,255,255,.45);font-size:11px;text-transform:uppercase;letter-spacing:.07em;margin-top:3px}
.srch-wrap{position:relative}
.srch-wrap input{width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:12px;padding:14px 18px 14px 46px;color:#fff;font-size:16px;outline:none;font-family:inherit;transition:border-color .2s}
.srch-wrap input:focus{border-color:var(--g1);background:rgba(255,255,255,.16)}
.srch-wrap input::placeholder{color:rgba(255,255,255,.4)}
.srch-ico{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);font-size:17px;pointer-events:none}
.cbody{padding:22px 24px;display:flex;flex-direction:column;gap:22px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-t{font-size:12px;font-weight:700;color:var(--n2);text-transform:uppercase;letter-spacing:.08em}
.sec-a{font-size:13px;color:var(--g2);cursor:pointer;font-weight:600}
.qcats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.qcat{background:var(--w);border:1px solid var(--b1);border-radius:12px;padding:16px 10px;text-align:center;cursor:pointer;transition:all .14s}
.qcat:hover{border-color:var(--g1);transform:translateY(-2px);box-shadow:0 4px 12px rgba(241,196,107,.15)}
.qcat.on{background:var(--n2);border-color:var(--n2)}
.qcat-ico{font-size:26px;margin-bottom:6px;height:44px;display:flex;align-items:center;justify-content:center}
.qcat-svg{height:34px;max-width:80px}
.qcat-img{height:38px;max-width:90px;width:auto;object-fit:contain}
.qcat-lbl{font-size:12px;font-weight:600;color:var(--t1);line-height:1.25}
.qcat.on .qcat-lbl{color:var(--g1)}
.rlist{display:flex;flex-direction:column;gap:8px}
.rcard{background:var(--w);border:1px solid var(--b1);border-radius:11px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .14s}
.rcard:hover{border-color:var(--g1);box-shadow:0 3px 10px rgba(241,196,107,.18);transform:translateY(-1px)}
.rcode{background:var(--n2);color:var(--g1);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;flex-shrink:0;letter-spacing:.05em;min-width:58px;text-align:center}
.rinfo{flex:1;min-width:0}
.rname{font-size:14px;font-weight:600;color:var(--n2);margin-bottom:3px}
.rcat{font-size:12px;color:var(--t3)}
.rprice{font-size:17px;font-weight:700;color:var(--g2);flex-shrink:0}
.ia-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ia-card{background:var(--w);border:1px solid var(--b1);border-radius:12px;padding:16px;cursor:pointer;display:flex;gap:14px;align-items:flex-start;transition:all .14s}
.ia-card:hover{border-color:var(--g1);transform:translateY(-1px);box-shadow:0 3px 10px rgba(241,196,107,.15)}
.ia-ico{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ia-name{font-size:14px;font-weight:700;color:var(--n2);margin-bottom:3px}
.ia-desc{font-size:12px;color:var(--t2);line-height:1.4}
.ia-badge{font-size:9px;background:var(--g1);color:var(--n2);border-radius:7px;padding:1px 6px;font-weight:700;display:inline-block;margin-top:3px}
.leit{border-radius:10px;padding:14px 16px;display:flex;gap:13px;align-items:center;margin-bottom:9px}
.lu{background:#FEF3C7;border:1px solid #F59E0B}
.li{background:#DBEAFE;border:1px solid #93C5FD}
.lt{font-size:14px;font-weight:600;line-height:1.35}
.ls{font-size:12px;margin-top:3px;opacity:.8}
.lu .lt,.lu .ls{color:#78350F}
.li .lt,.li .ls{color:#1E40AF}
.lbtn{background:var(--n2);color:var(--g1);border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.lbtn:hover{background:var(--n1)}
.uprow{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--off);font-size:13px;gap:10px}
.uprow:last-child{border-bottom:none}
.updot{width:7px;height:7px;border-radius:50%;background:var(--g1);flex-shrink:0;margin-top:6px}
.adash{padding:24px}
.ag4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:20px}
.met{background:var(--w);border:1px solid var(--b1);border-radius:14px;padding:20px;box-shadow:var(--shadow-sm);transition:all .2s;position:relative;overflow:hidden}
.met:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--g1)}
.met::before{content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--g1),var(--g2))}
.mlbl{font-size:12px;color:var(--t2);font-weight:500;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.mval{font-size:32px;font-weight:700;color:var(--n1);letter-spacing:-.02em;line-height:1}
.msub{font-size:12px;color:var(--t2);margin-top:4px}
.ag2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.card{background:var(--w);border:1px solid var(--b1);border-radius:14px;padding:20px;box-shadow:var(--shadow-sm);transition:box-shadow .18s}
.card:hover{box-shadow:var(--shadow-md)}
.ctit{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--t2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.ctit::before{content:"";width:4px;height:14px;background:var(--g1);border-radius:2px;display:inline-block}
.srow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--off);font-size:13px;align-items:center}
.srow:last-child{border-bottom:none}
.catpage{padding:22px 24px}
.ftabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.ft{padding:7px 14px;border-radius:16px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--b1);background:var(--w);color:var(--t1);transition:all .14s}
.ft:hover{border-color:var(--g1);color:var(--n2)}
.ft.on{background:var(--n2);color:var(--g1);border-color:var(--n2);font-weight:600}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.sc{background:var(--w);border:1px solid var(--b1);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.sc::after{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--g1),var(--g2));opacity:0;transition:opacity .2s}
.sc:hover{border-color:var(--g1);transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.sc:hover::after{opacity:1}
.sc-code{background:var(--n1);color:var(--g1);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;display:inline-block;margin-bottom:8px;letter-spacing:.05em}
.sc-name{font-size:14px;font-weight:600;color:var(--n1);margin-bottom:4px;line-height:1.4;min-height:40px}
.sc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px dashed var(--b1)}
.sc-price{font-size:17px;font-weight:700;color:var(--g2)}
.stag{font-size:11px;border-radius:6px;padding:3px 8px;font-weight:500;background:var(--off2);color:var(--t2);display:inline-flex;align-items:center;gap:5px}
.stag-svg{height:14px;width:auto}
.stag-img{height:16px;width:auto;object-fit:contain;vertical-align:middle}
.cat-badge{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--b1);border-radius:8px;padding:4px 8px;height:28px}
.cat-badge-svg{height:18px;width:auto}
.cat-badge-lbl{font-size:11px;font-weight:600;color:var(--t1)}
.stag-tpl{background:#D1FAE5;color:#065F46}
.stag-urg{background:#FEE2E0;color:#991B1B}
.overlay{position:absolute;inset:0;background:rgba(10,28,68,.65);z-index:20;display:flex;align-items:flex-start;justify-content:center;padding-top:8px;overflow-y:auto}
.modal{background:var(--w);border-radius:16px;width:96%;max-width:820px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.4)}
.mhdr{background:var(--n2);padding:22px 26px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid rgba(241,196,107,.22);flex-shrink:0}
.m-code-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.mcode{background:var(--g1);color:var(--n2);border-radius:6px;padding:4px 11px;font-size:13px;font-weight:700;letter-spacing:.05em}
.m-urg{background:#FEE2E0;color:#991B1B;border-radius:8px;padding:3px 9px;font-size:11px;font-weight:700}
.m-obs{font-size:11px;background:rgba(255,255,255,.1);color:#B0C4D4;border-radius:6px;padding:3px 8px}
.mname{color:#fff;font-size:19px;font-weight:600;margin-bottom:4px;line-height:1.3}
.mcat{color:#9AB8CF;font-size:13px}
.mprice{color:var(--g1);font-size:26px;font-weight:700;text-align:right}
.xbtn{background:none;border:none;color:#7BA3C0;cursor:pointer;font-size:22px;display:block;margin-bottom:8px;padding:4px 8px;border-radius:6px;transition:all .14s}
.xbtn:hover{background:rgba(255,255,255,.08);color:#fff}
.mtabs{display:flex;border-bottom:1px solid var(--b1);padding:0 26px;flex-shrink:0;overflow-x:auto;background:#FAFBFC}
.mtab{border:none;background:none;padding:14px 20px;font-size:14px;font-weight:500;cursor:pointer;color:var(--t2);border-bottom:3px solid transparent;margin-bottom:-1px;font-family:inherit;white-space:nowrap;transition:all .14s}
.mtab:hover{color:var(--n2)}
.mtab.on{color:var(--n2);border-bottom-color:var(--g1);font-weight:600}
.tcnt{background:var(--g1);color:var(--n2);border-radius:9px;padding:2px 7px;font-size:11px;font-weight:700;margin-left:5px}
.mbody{padding:22px 26px;overflow-y:auto;flex:1}
.msec{margin-bottom:20px}
.msec-lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.ablock{border-radius:8px;padding:10px 13px;margin-bottom:6px;display:flex;gap:9px;font-size:13px;line-height:1.5}
.aw{background:#FEF3C7;color:#78350F}.ai{background:#DBEAFE;color:#1E3A5F}.ao{background:#D1FAE5;color:#064E3B}.ae-b{background:#FFF0F0;color:#7F1D1D}
.ditem{display:flex;gap:10px;padding:10px 13px;background:var(--off);border-radius:7px;font-size:13px;margin-bottom:5px;align-items:flex-start;line-height:1.5}
.dnum{color:var(--g2);font-weight:700;flex-shrink:0;min-width:20px}
.iitem{display:flex;gap:9px;font-size:13px;padding:4px 0;line-height:1.5}
.icheck{color:#1A7A4A;flex-shrink:0;font-weight:700}
.ubox{border:1px solid #C4B5FD;border-radius:9px;overflow:hidden}
.urow{display:flex;gap:10px;align-items:center;padding:10px 14px;font-size:13px}
.urow:not(:last-child){border-bottom:1px solid #C4B5FD}
.urow:nth-child(odd){background:#FAF5FF}

// ── Sessão / token Supabase (RLS-ready) ──────────────────────────────
// A app envia o JWT do utilizador autenticado em TODOS os pedidos REST,
// com fallback para a anon key (necessário para o fallback offline e
// enquanto as policies forem using(true)). Quando o RLS por auth.uid()/
// role for aplicado (ver supabase-rls-policies.sql), os pedidos passam a
// ser avaliados como o utilizador autenticado em vez de anon.
function sbGetSession(){
  try{
    const t=sessionStorage.getItem("seven_token");
    if(!t)return null;
    return {token:t,refresh:sessionStorage.getItem("seven_refresh")||"",exp:parseInt(sessionStorage.getItem("seven_token_exp")||"0",10)};
  }catch(e){return null;}
}
function sbStoreSession(data){
  try{
    if(data&&data.access_token){
      sessionStorage.setItem("seven_token",data.access_token);
      if(data.refresh_token)sessionStorage.setItem("seven_refresh",data.refresh_token);
      const ttl=(data.expires_in?parseInt(data.expires_in,10):3600)*1000;
      sessionStorage.setItem("seven_token_exp",String(Date.now()+ttl));
    }
  }catch(e){}
}
function sbClearSession(){try{sessionStorage.removeItem("seven_token");sessionStorage.removeItem("seven_refresh");sessionStorage.removeItem("seven_token_exp");}catch(e){}}
// Token válido (margem de 60s) ou "" se ausente/expirado.
function sbValidToken(){const s=sbGetSession();if(!s||!s.token)return "";if(s.exp&&Date.now()>s.exp-60000)return "";return s.token;}
let _sbRefreshing=null;
async function sbRefreshSession(){
  const s=sbGetSession();
  if(!s||!s.refresh)return "";
  if(_sbRefreshing)return _sbRefreshing;
  _sbRefreshing=(async()=>{
    try{
      const r=await fetch(SB_URL+"/auth/v1/token?grant_type=refresh_token",{method:"POST",headers:{"Content-Type":"application/json","apikey":SB_KEY},body:JSON.stringify({refresh_token:s.refresh})});
      if(!r.ok){if(r.status===400||r.status===401)sbClearSession();return "";}
      const d=await r.json();sbStoreSession(d);return d.access_token||"";
    }catch(e){return "";}
    finally{_sbRefreshing=null;}
  })();
  return _sbRefreshing;
}
// Headers para PostgREST/Storage: JWT do utilizador se válido, senão anon.
function sbHeaders(extra){const t=sbValidToken()||SB_KEY;return Object.assign({'apikey':SB_KEY,'Authorization':'Bearer '+t,'Content-Type':'application/json'},extra||{});}
// fetch com refresh automático de token em 401 (uma tentativa).
async function sbFetch(url,opts,extraHeaders){
  opts=opts||{};
  opts.headers=sbHeaders(extraHeaders);
  let r=await fetch(url,opts);
  if(r.status===401){
    const s=sbGetSession();
    if(s&&s.refresh){const nt=await sbRefreshSession();if(nt){opts.headers=sbHeaders(extraHeaders);r=await fetch(url,opts);}}
  }
  return r;
}

  async post(table,data){try{const r=await sbFetch(SB_URL+'/rest/v1/'+table,{method:'POST',body:JSON.stringify(Array.isArray(data)?data:[data])},{'Prefer':'return=representation,resolution=merge-duplicates'});if(!r.ok)throw new Error(r.status);return await r.json();}catch(e){console.warn('[SB] POST '+table+' failed:',e.message);return null;}},

  async del(table,filter){try{await sbFetch(SB_URL+'/rest/v1/'+table+'?'+filter,{method:'DELETE'});}catch(e){console.warn('[SB] DELETE '+table+' failed:',e.message);}}

let _bjFontLoaded=false,_bjFontFailed=false;
async function loadBaiJamjureeFontIntoPdf(doc){
  if(_bjFontFailed)return false;
  const urls=[
    {weight:"normal",src:"https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/baijamjuree/BaiJamjuree-Regular.ttf"},
    {weight:"bold",src:"https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/baijamjuree/BaiJamjuree-Bold.ttf"}
  ];
  try{
    for(const f of urls){
      const r=await fetch(f.src);
      if(!r.ok)throw new Error("HTTP "+r.status+" em "+f.src);
      const buf=await r.arrayBuffer();
      const bytes=new Uint8Array(buf);
      let bin="";for(let i=0;i<bytes.length;i+=8192)bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+8192));
      const b64=btoa(bin);
      const fname="BaiJamjuree-"+(f.weight==="bold"?"Bold":"Regular")+".ttf";
      doc.addFileToVFS(fname,b64);
      doc.addFont(fname,"BaiJamjuree",f.weight);
      console.log("[BaiJamjuree] carregada "+f.weight+" ("+bytes.length+" bytes)");
    }
    _bjFontLoaded=true;
    return true;
  }catch(e){console.warn("[BaiJamjuree] falha — fallback para helvetica:",e&&e.message);_bjFontFailed=true;return false;}
}
function patchDocFont(doc){
  if(!doc||doc._fontPatched)return;
  const orig=doc.setFont.bind(doc);
  doc.setFont=function(name,style){
    if(_bjFontLoaded&&name==="helvetica")return orig("BaiJamjuree",style||"normal");
    return orig(name,style);
  };
  doc._fontPatched=true;
}
async function letterheadToPng(prefixOrUrl){
  let url=prefixOrUrl;
  if(prefixOrUrl&&!/^https?:\/\//.test(prefixOrUrl)){
    url=(sbCompanySettings||{})["letterhead_"+prefixOrUrl+"_url"]||"";
  }
  if(!url)return null;
  try{
    const pdfjs=await loadPdfJs();
    const r=await fetch(url);
    if(!r.ok)return null;
    const buf=await r.arrayBuffer();
    const pdf=await pdfjs.getDocument({data:buf}).promise;
    const page=await pdf.getPage(1);
    const viewport=page.getViewport({scale:2.0});
    const canvas=document.createElement("canvas");
    canvas.width=viewport.width;canvas.height=viewport.height;
    await page.render({canvasContext:canvas.getContext("2d"),viewport}).promise;
    return canvas.toDataURL("image/png");
  }catch(e){console.warn("[letterhead]",e&&e.message);return null;}
}

function bodyMdToHtml(text){
  if(!text)return "";
  let s=String(text).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  s=s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/_{6,}/g,'<span style="display:inline-block;border-bottom:1px solid #000;width:60mm;margin-top:14pt"></span>');
  s=s.replace(/^(i{1,3}|iv|v|vi{0,3}|ix|x)\)\s+(.+)$/gim,'<p style="margin:6pt 0 6pt 18pt;text-align:justify"><strong>$1)</strong> $2</p>');
  s=s.replace(/^[-•]\s+(.+)$/gm,'<p style="margin:4pt 0 4pt 18pt;text-align:justify">– $1</p>');
  s=s.replace(/^(\d+)\.\s+(.+)$/gm,'<p style="margin:6pt 0 6pt 0;text-align:justify"><strong>$1.</strong> $2</p>');
  s=s.replace(/\n\n+/g,'</p><p style="margin:8pt 0;text-align:justify">');
  s=s.replace(/\n/g,"<br>");
  return '<p style="margin:8pt 0;text-align:justify">'+s+'</p>';
}
function loadHtml2Canvas(){

async function generateDocumentFromHTML(docKey,formData){
  const tpl=(sbDocTemplates||{})[docKey];
  if(!tpl){toast("Modelo "+docKey+" não encontrado");return;}
  const fd=formData||{};
  if(typeof window.jspdf==="undefined"&&typeof jspdf==="undefined"){toast("A carregar jsPDF…");const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js";s.onload=()=>setTimeout(()=>generateDocumentFromHTML(docKey,fd),300);document.head.appendChild(s);return;}
  let html2c;try{html2c=await loadHtml2Canvas();}catch(e){toast("Erro html2canvas: "+e.message);return;}
  const resolved=resolveDocumentVariables(tpl.body||"",fd,docKey);
  const lhPng=await letterheadToPng(tpl.letterhead||"empresa");
  const lhHtml=lhPng?`<img src="${lhPng}" alt="" style="position:absolute;top:0;left:0;width:100%;height:auto;z-index:0">`:"";
  const bodyHtml=bodyMdToHtml(resolved);
  const titleText=tpl.type==="procuracao"?"PROCURAÇÃO":(tpl.title||"DOCUMENTO").toUpperCase();
  const padding=lhPng?"55mm 25mm 35mm 25mm":"30mm 25mm 25mm 25mm";
  const wrapper=document.createElement("div");
  wrapper.style.cssText="position:fixed;left:-9999px;top:0;width:794px;font-family:'Bai Jamjuree','Helvetica Neue',Arial,sans-serif;font-size:11pt;line-height:1.65;color:#000;background:white;box-sizing:border-box";
  wrapper.innerHTML=`<div style="position:relative;padding:${padding};min-height:1123px;box-sizing:border-box">
    ${lhHtml}
    <div style="position:relative;z-index:1">
      <h1 style="text-align:center;font-size:14pt;font-weight:700;text-decoration:underline;letter-spacing:.05em;margin:0 0 18pt">${esc(titleText)}</h1>
      ${bodyHtml}
    </div>
  </div>`;
  document.body.appendChild(wrapper);
  try{
    const canvas=await html2c(wrapper,{scale:2,useCORS:true,allowTaint:false,logging:false,backgroundColor:"#ffffff"});
    const{jsPDF}=window.jspdf||jspdf;
    const pdf=new jsPDF({unit:"mm",format:"a4"});
    const pageWmm=210,pageHmm=297;
    const pxPerMm=canvas.width/pageWmm;
    const pageHpx=Math.floor(pageHmm*pxPerMm);
    const totalH=canvas.height;
    if(totalH<=pageHpx){
      const ratio=totalH/canvas.width;
      pdf.addImage(canvas.toDataURL("image/png"),"PNG",0,0,pageWmm,pageWmm*ratio);
    } else {
      let yOffset=0,first=true;
      while(yOffset<totalH){
        const sliceH=Math.min(pageHpx,totalH-yOffset);
        const slice=document.createElement("canvas");
        slice.width=canvas.width;slice.height=sliceH;
        const ctx=slice.getContext("2d");
        ctx.fillStyle="#ffffff";ctx.fillRect(0,0,slice.width,slice.height);
        ctx.drawImage(canvas,0,-yOffset);
        if(!first)pdf.addPage();
        const sliceMm=(sliceH/pxPerMm);
        pdf.addImage(slice.toDataURL("image/png"),"PNG",0,0,pageWmm,sliceMm);
        yOffset+=sliceH;first=false;
      }
    }
    const cliName=fd.nome||fd.nome1||fd.nome_menor||"Documento";
    const clean=String(cliName).replace(/[^a-zA-Z0-9À-ÿ ]/g,"").replace(/\s+/g,"_");
    const fname=tpl.title.replace(/\s+/g,"-")+"_"+clean+".pdf";
    pdf.save(fname);
    logDocumentIssued(docKey,tpl.type,tpl.title,cliName,fd,fd.service_code||"");
    toast("✓ "+tpl.title+" descarregado");
  }catch(e){toast("Erro ao gerar PDF: "+e.message);console.error(e);}
  finally{document.body.removeChild(wrapper);}
}

function buildProcText(modelKey,cliente){
  const m=PROC.modelos[modelKey];if(!m)return"";
  const p=getProcurador(m.proc);if(!p)return"";
  const cl=cliente;
  const dataHoje=new Date().toLocaleDateString("pt-PT",{day:"2-digit",month:"long",year:"numeric"});
  const parts=[];
  if(cl.nome)parts.push(cl.nome);
  if(cl.nacionalidade)parts.push("de nacionalidade "+cl.nacionalidade);
  if(cl.estadoCivil)parts.push("estado civil "+cl.estadoCivil);
  if(cl.dataNascimento){const d=new Date(cl.dataNascimento);if(!isNaN(d))parts.push("nascido(a) em "+d.toLocaleDateString("pt-PT"));}
  if(cl.tipoDoc&&cl.numDoc)parts.push("portador(a) do "+cl.tipoDoc+" n.º "+cl.numDoc);
  else if(cl.numDoc)parts.push("portador(a) do documento n.º "+cl.numDoc);
  if(cl.validadeDoc){const d=new Date(cl.validadeDoc);if(!isNaN(d))parts.push("válido até "+d.toLocaleDateString("pt-PT"));}
  if(cl.nif)parts.push("com NIF "+cl.nif);
  if(cl.morada)parts.push("residente em "+cl.morada);
  const identificacao=parts.length?"Eu, "+parts.join(", ")+",":"Eu, (identificação do outorgante),";
  let procBloco;
  if(m.proc==="juridico"){
    const jb=[p.nome,p.funcao+(p.cedula?", Cédula Profissional n.º "+p.cedula:"")];
    if(p.ordem)jb.push(p.ordem);
    if(p.morada)jb.push("Morada profissional: "+p.morada);
    procBloco=jb.join("\n");
  } else {
    const ab=[p.nome,p.funcao,p.empresa];
    if(p.nif&&p.nif!=="(NIF empresa)")ab.push("NIF: "+p.nif);
    if(p.morada)ab.push("Morada: "+p.morada);
    procBloco=ab.join("\n");
  }
  const localidadeData=(cl.localidade||"Albufeira")+", "+dataHoje;
  const assinatura=cl.nome||"(Nome do Outorgante)";
  const svcLinha=cl.svcsNomes?"Serviço(s) contratado(s): "+cl.svcsNomes+"\n\n":"";

function normalizeComplexity(v){if(!v)return null;return COMPLEX_LEGACY_MAP[v]||v;}
function getComplexity(code){
  const svc=SVCS.find(s=>s.code===code);
  if(svc&&svc.complexity)return normalizeComplexity(svc.complexity);
  try{const o=JSON.parse(localStorage.getItem("seven_complexity")||"{}");if(o[code])return normalizeComplexity(o[code]);}catch(e){}
  if(SVC_COMPLEXITY[code])return normalizeComplexity(SVC_COMPLEXITY[code]);
  if(code.startsWith("JR"))return"muito_complexo";
  if(code.startsWith("CT"))return"medio";
  if(code.startsWith("AM1")&&parseInt(code.slice(2))>=155)return"medio";
  return"simples";
}
function setComplexity(code,value){
  const norm=normalizeComplexity(value)||value;
  try{const o=JSON.parse(localStorage.getItem("seven_complexity")||"{}");o[code]=norm;localStorage.setItem("seven_complexity",JSON.stringify(o));}catch(e){}
  syncSvcInMemory(code,{complexity:norm});
  if(sbConnected){SB.patch("services","code=eq."+code,{complexity:norm}).catch(()=>{});}
}
function resetComplexity(code){
  try{const o=JSON.parse(localStorage.getItem("seven_complexity")||"{}");delete o[code];localStorage.setItem("seven_complexity",JSON.stringify(o));}catch(e){}
  const svc=SVCS.find(s=>s.code===code);if(svc)svc.complexity=null;
}

function calcCommissionFor(revenue,tiers){
  if(!Array.isArray(tiers)||!tiers.length)return 0;
  let total=0;
  tiers.forEach(t=>{const from=+t.from||0;const to=t.to==null?Infinity:+t.to;if(revenue>from){const amt=Math.min(revenue,to)-from;if(amt>0)total+=amt*((+t.pct||0)/100);}});
  return Math.round(total*100)/100;
}
function filterByPeriod(data,period){
  const now=new Date("2026-04-16");
  const start=new Date(now);
  if(period==="week"){start.setDate(now.getDate()-now.getDay());}
  else if(period==="month"){start.setDate(1);}
  else if(period==="year"){start.setMonth(0);start.setDate(1);}
  else{start.setDate(1);}
  return data.filter(d=>new Date(d.date)>=start&&new Date(d.date)<=now);
}
function prevPeriod(data,period){
  const now=new Date("2026-04-16");
  let start,end;
  if(period==="week"){end=new Date(now);end.setDate(now.getDate()-now.getDay()-1);start=new Date(end);start.setDate(end.getDate()-6);}
  else{end=new Date(now.getFullYear(),now.getMonth(),0);start=new Date(end.getFullYear(),end.getMonth(),1);}
  return data.filter(d=>{const dd=new Date(d.date);return dd>=start&&dd<=end;});
}
function calcMetrics(data){
  const total=data.length;const closed=data.filter(d=>d.status==="closed");const lost=data.filter(d=>d.status==="lost");
  const closeRate=total?Math.round(closed.length/total*100):0;
  const avgResp=total?Math.round(data.reduce((s,d)=>s+d.response_time,0)/total):0;
  const revenue=closed.reduce((s,d)=>s+d.value,0);
  const ticket=closed.length?Math.round(revenue/closed.length):0;
  return{total,closed:closed.length,lost:lost.length,open:data.filter(d=>d.status==="open").length,closeRate,avgResp,revenue,ticket};
}

function searchCAE(q){
  if(!q)return[];
  const qn=q.toLowerCase().trim();
  const exact=CAE_DB.filter(c=>c.c===qn);
  if(exact.length)return exact.slice(0,10);
  const terms=qn.split(/\s+/).filter(t=>t.length>1);
  const scored=CAE_DB.map(c=>{
    const hay=(c.c+" "+c.t+" "+c.n).toLowerCase();
    let score=0;
    terms.forEach(t=>{if(hay.includes(t))score+=10;if(c.n.toLowerCase().startsWith(t))score+=5;if(c.t.includes(t))score+=3;});
    return{c,s:score};
  }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
  return scored.slice(0,10).map(x=>x.c);
}

  },

function getAgentDef(id){
  return (sbAiAgents&&sbAiAgents[id])||AGENT_DEFS[id]||null;
}
function buildAgentContextSuffix(def){
  const parts=[];
  if(def.use_services_context)parts.push("\n\nSERVIÇOS SEVEN SERVICES:\n"+buildServicesContext());
  if(def.use_manual_context){
    const cf=def.context_filter||"";
    parts.push("\n\nMANUAL OPERACIONAL:\n"+(cf?buildManualContextFiltered(cf):buildManualContext()));
  }
  if(def.use_objections_context)parts.push("\n\nOBJECÇÕES DOCUMENTADAS (por serviço):\n"+buildObjecContext());
  if(def.use_cae_context)parts.push("\n\nTABELA OFICIAL DE CAE:\n"+buildCaeContext());
  return parts.join("");
}
function getAgentSystemPrompt(id){
  const def=getAgentDef(id);
  const suffix="\n\nFORMATO DAS RESPOSTAS:\n- Usa texto simples e directo\n- Evita usar # para títulos — usa apenas texto em maiúsculas se precisares de cabeçalho\n- Podes usar **negrito** para destacar pontos importantes\n- Para listas usa - no início da linha\n- Respostas concisas — sem introduções longas\n\nTermina SEMPRE a resposta com uma linha iniciada por [FONTES: ...] listando os códigos/módulos usados, separados por vírgula. Se não usaste nenhuma fonte específica, usa [FONTES: -].";
  if(!def)return "És o assistente SEVEN IA. Responde com base nos dados internos da SEVEN Services."+suffix;
  return def.system_prompt+buildAgentContextSuffix(def)+suffix;
}
async function callAnthropicAPI(systemPrompt,userMessage,maxTokens){
  const apiKey=await getAnthropicKeyAsync();
  if(!apiKey)return {text:"SEVEN IA não configurado. O Admin deve adicionar a API Key em Configurações → Empresa.",sources:""};
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:ANTHROPIC_MODEL,max_tokens:maxTokens||1000,system:systemPrompt,messages:[{role:"user",content:userMessage}]})
    });
    if(!r.ok){
      let err;try{err=await r.json();}catch(e){err={};}
      if(err&&err.error&&err.error.type==="authentication_error")return {text:"API Key inválida. Verifica em Configurações → Empresa.",sources:""};
      return {text:"Erro ao contactar o SEVEN IA. Tenta novamente.",sources:""};
    }
    const data=await r.json();
    const full=(data.content&&data.content[0]&&data.content[0].text)||"Sem resposta.";
    return splitSources(full);
  }catch(e){return {text:"Erro de ligação. Verifica a tua internet.",sources:""};}
}
function splitSources(text){
  const m=text.match(/\n?\[FONTES:\s*([^\]]*)\]\s*$/i);
  if(!m)return {text:text.trim(),sources:""};
  const srcs=(m[1]||"").trim();
  return {text:text.slice(0,m.index).trim(),sources:srcs==="-"?"":srcs};
}
function getAgentHistory(id){return agentHistories[id]||[];}
function addToHistory(id,role,content){
  if(!agentHistories[id])agentHistories[id]=[];
  agentHistories[id].push({role,content});
  if(agentHistories[id].length>20)agentHistories[id]=agentHistories[id].slice(-20);
}
function clearAgentHistory(id){agentHistories[id]=[];render();}
async function sendAgentMessage(agentId,userMessage){
  const systemPrompt=getAgentSystemPrompt(agentId);
  console.log("[IA]",agentId,"· systemPrompt:",systemPrompt.length,"chars · user:",userMessage.length,"chars");
  addToHistory(agentId,"user",userMessage);
  agentTyping=true;render();
  const history=getAgentHistory(agentId);
  const messages=history.map(h=>({role:h.role,content:h.content}));
  const apiKey=await getAnthropicKeyAsync();
  let replyObj;
  if(!apiKey){replyObj={text:"SEVEN IA não configurado. O Admin deve adicionar a API Key em Configurações → Empresa.",sources:""};}
  else{
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:ANTHROPIC_MODEL,max_tokens:1000,system:systemPrompt,messages:messages})
      });
      if(!r.ok){
        let err={};try{err=await r.json();}catch(e){}
        const etype=(err&&err.error&&err.error.type)||"";
        const emsg=(err&&err.error&&err.error.message)||("HTTP "+r.status);
        console.warn("[IA] API error",r.status,etype,emsg);
        if(etype==="authentication_error")replyObj={text:"API Key inválida. Verifica em Configurações → Empresa.",sources:""};
        else if(r.status===400)replyObj={text:"Erro SEVEN IA (400): "+emsg+"\n\nSe for limite de contexto, pede ao admin para usar um PDF CAE mais curto.",sources:""};
        else if(r.status===429)replyObj={text:"Limite de pedidos atingido. Espera alguns segundos e tenta de novo.",sources:""};
        else if(r.status>=500)replyObj={text:"A API Anthropic está com problemas ("+r.status+"). Tenta de novo daqui a pouco.",sources:""};
        else replyObj={text:"Erro SEVEN IA ("+r.status+"): "+emsg,sources:""};
      } else {
        const data=await r.json();
        const full=(data.content&&data.content[0]&&data.content[0].text)||"Sem resposta.";
        replyObj=splitSources(full);
      }
    }catch(e){console.warn("[IA] network error:",e&&e.message);replyObj={text:"Erro de ligação: "+(e&&e.message||"desconhecido"),sources:""};}
  }
  agentTyping=false;
  addToHistory(agentId,"assistant",replyObj.text+(replyObj.sources?"\n[FONTES: "+replyObj.sources+"]":""));
  render();
  setTimeout(scrollChatToEnd,50);
}
function scrollChatToEnd(){const m=document.getElementById("cmsgs");if(m)m.scrollTop=m.scrollHeight;}
function markdownToHtml(text){
  if(!text)return "";
  let html=String(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/^### (.+)$/gm,'<strong style="display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--t2);margin:10px 0 3px">$1</strong>')
    .replace(/^## (.+)$/gm,'<strong style="display:block;font-size:13px;font-weight:700;color:var(--t1);margin:8px 0 4px">$1</strong>')
    .replace(/^# (.+)$/gm,'<strong style="display:block;font-size:14px;font-weight:700;color:var(--t1);margin:8px 0 4px">$1</strong>')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*(?!\s)([^*\n]+?)\*(?!\*)/g,'$1<em>$2</em>')
    .replace(/`([^`]+?)`/g,'<code style="background:#EEF0F0;padding:1px 5px;border-radius:4px;font-family:ui-monospace,Menlo,monospace;font-size:11px">$1</code>')
    .replace(/^---$/gm,'<hr style="border:none;border-top:.5px solid var(--b1);margin:8px 0">')
    .replace(/^[-•]\s+(.+)$/gm,"<li>$1</li>")
    .replace(/^(\d+)\.\s+(.+)$/gm,"<li>$2</li>")
    .replace(/(<li>[\s\S]*?<\/li>(?:\n<li>[\s\S]*?<\/li>)*)/g,'<ul style="padding-left:18px;margin:4px 0">$1</ul>')
    .replace(/\n\n+/g,'</p><p style="margin:6px 0">')
    .replace(/\n/g,"<br>");
  return '<p style="margin:0">'+html+'</p>';
}

}
const MANUAL={
welcome:{t:"Bem-vindo ao BackOffice",cap:"Introdução",c:`<div class="mh1">Bem-vindo ao BackOffice SEVEN Services</div><p class="mp">O BackOffice é o sistema interno da SEVEN Services — o teu centro de trabalho para consultar serviços, usar templates Kommo e aceder ao SEVEN IA.</p><h2 class="mh2">Como funciona</h2><ul class="mul"><li><strong>Serviços</strong> — catálogo completo com 141 serviços, fichas, alertas, documentos e templates Kommo prontos a copiar</li><li><strong>Manual Operacional</strong> — toda a documentação interna: módulos, anexos, políticas e a tua ficha de função</li><li><strong>SEVEN IA</strong> — 5 agentes de inteligência artificial para apoiar no atendimento, objecções, dúvidas, treino e consulta ao manual</li></ul><h2 class="mh2">Regra de Ouro</h2><p class="mp"><strong>Este sistema deve ser mais rápido do que perguntar a alguém.</strong> Se tens uma dúvida sobre um serviço, documentos ou como responder a um cliente — começa aqui. Consulta o manual antes de escalar à direcção.</p><h2 class="mh2">SEVEN IA — Manual</h2><p class="mp">O agente <strong>SEVEN IA — Consulta ao Manual</strong> responde a qualquer pergunta sobre os procedimentos da empresa com base no conteúdo real do Manual Operacional.</p>`},
m1:{t:"Módulo 1 — Visão Geral",cap:"Manual Operacional",c:`<div class="mh1">Módulo 1 — Visão Geral da Operação</div><h2 class="mh2">Objectivo do Manual</h2><p class="mp">Este Manual existe para garantir que a SEVEN Services funcione de forma organizada, padronizada, eficiente e escalável. Alinha comportamento, decisões e atendimento; garante consistência na experiência do cliente; dá autonomia e segurança aos colaboradores; reduz erros, retrabalho e conflitos.</p><h2 class="mh2">Visão da SEVEN Services</h2><p class="mp">Não existimos apenas para gerar faturamento. Existimos para resolver situações que os clientes não conseguem resolver sozinhos. <strong>Vendemos soluções reais, não serviços a qualquer custo.</strong> Se algo não é o que o cliente precisa, não vendemos, mesmo que seja financeiramente vantajoso no curto prazo.</p><h2 class="mh2">Clareza acima de Velocidade</h2><p class="mp">A clareza e a correção são mais importantes do que a rapidez. Um <em>"Vou confirmar e retorno com a informação correcta"</em> é sempre melhor do que uma resposta errada.</p><h2 class="mh2">Autonomia e Pensamento Crítico</h2><ul class="mul"><li>Pensa antes de perguntar. Pesquisa antes de escalar.</li><li>Traz soluções, não apenas problemas.</li><li>Toma decisões rotineiras dentro da tua função.</li></ul><h2 class="mh2">Erros Conscientes vs. Descaso</h2><p class="mp">Erros decorrentes de análise e decisão consciente são aceitáveis. Não são aceitáveis: negligência, descaso, repetição do mesmo erro, descumprimento de regras.</p>`},
m2:{t:"Módulo 2 — Funções",cap:"Manual Operacional",c:`<div class="mh1">Módulo 2 — Estrutura de Funções</div><p class="mp">Este módulo define as funções, responsabilidades, limites e fluxos de comunicação de cada cargo da SEVEN Services.</p><h2 class="mh2">Funções que compõem a operação</h2><ul class="mul"><li><strong>Coordenadora de Processos — Albufeira</strong> (Gabriela Ramos)</li><li><strong>Coordenadora de Processos — Faro</strong> (Dayane Silva)</li><li><strong>Responsável Jurídica</strong> (Ana Kathlyn)</li><li><strong>Diretor Executivo</strong> (Danilo Jesus)</li></ul><p class="mp">Cada função possui um documento próprio (Anexo A) — visível apenas para o colaborador correspondente. Em caso de conflito entre interpretação pessoal e documento de função, <strong>prevalece o documento de função.</strong></p>`},
a_role:{t:"Anexo A — A Minha Função",cap:"Manual Operacional",role:true,c:``},
m3:{t:"Módulo 3 — Regras Operacionais",cap:"Manual Operacional",c:`<div class="mh1">Módulo 3 — Regras Operacionais</div><h2 class="mh2">1. Pedidos de Ausência e Horário</h2><p class="mp">Qualquer pedido de saída antecipada, ausência, ajuste de horário ou liberação deve ser feito exclusivamente por mensagem escrita no chat do Teams. Pedidos verbais não são considerados.</p><h2 class="mh2">2. Regra de Autonomia — Busca de Informação</h2><p class="mp">Antes de acionar a direcção: (1) verificar no CRM, documentos internos e scripts disponibilizados; (2) se não houver resposta, pesquisar em fontes como Google, ChatGPT ou fontes oficiais. Acionar a liderança sem cumprir estas etapas não é aceitável.</p><h2 class="mh2">3. Regra das "3 Soluções Antes de Perguntar"</h2><p class="mp">Toda dúvida deve ser apresentada com no mínimo 3 opções de solução: contexto do caso, Opção A / B / C, risco percebido em cada opção, e opinião sobre a opção mais adequada. Mensagens que não sigam este formato não serão respondidas.</p><h2 class="mh2">4. Consulta de Valores</h2><p class="mp">Todos os valores devem ser consultados exclusivamente nos documentos oficiais da Direcção. Se houver divergência, comunicar imediatamente à Direcção.</p><h2 class="mh2">5. Validade de Serviços Não Iniciados</h2><p class="mp">Serviços pagos e não iniciados por falta de documentação do cliente possuem validade máxima de <strong>90 dias</strong>. Após esse prazo, o processo é encerrado no CRM por inércia do cliente, sem negociação e sem reembolso.</p>`},
m4:{t:"Módulo 4 — Atendimento",cap:"Manual Operacional",c:`<div class="mh1">Módulo 4 — Atendimento ao Cliente</div><h2 class="mh2">Identificação Profissional Correcta</h2><p class="mp"><strong>Versão padrão:</strong> "SEVEN Services, <em>(seu nome)</em>, em que posso ajudar?"</p><p class="mp"><strong>Versão formal:</strong> "SEVEN Services, <em>(seu nome)</em> Coordenação de Processos, bom dia / boa tarde. Como posso ajudar?"</p><h2 class="mh2">Quando pedem pela advogada ou pelo Danilo</h2><p class="mp">"Sou Coordenadora de Processos aqui na SEVEN. Atendo a triagem inicial. Pode explicar-me brevemente o assunto para que eu encaminhe da melhor forma?"</p><p class="mp">Se insistirem na advogada: "A Dra. Ana realiza atendimentos apenas por agendamento. Posso recolher o seu nome, contacto e o motivo."</p><h2 class="mh2">Quando o cliente diz "é urgente"</h2><p class="mp">"Entendo que é urgente. Pode resumir em uma frase o que aconteceu? Assim verifico se consigo ajudar imediatamente ou se preciso solicitar prioridade ao responsável."</p><h2 class="mh2">Scripts completos</h2><p class="mp">Os scripts detalhados de atendimento estão no <strong>Anexo B</strong> — consulta sempre antes de criar o teu próprio script.</p>`},
b_atend:{t:"Anexo B — Scripts de Atendimento",cap:"Manual Operacional",c:`<div class="mh1">Anexo B — Scripts de Atendimento</div><h2 class="mh2">B1 — Atendimento Inicial</h2><p class="mp"><strong>Presencial/Ligação:</strong> "SEVEN Services, <em>(seu nome)</em>, em que posso ajudar?"</p><p class="mp">Quando perguntam "É a advogada?": "Sou Coordenadora de Processos aqui na SEVEN. Atendo a triagem inicial. Pode explicar-me brevemente o assunto?"</p><p class="mp">Se insistirem na Dra. Ana: "A Dra. Ana realiza atendimentos apenas por agendamento. Posso recolher o seu nome, contacto e motivo."</p><p class="mp">Presencial: "Bom dia / boa tarde, seja bem-vindo(a) à SEVEN Services. Eu sou a <em>(seu nome)</em>. Tem agendamento ou deseja informações?"</p><hr style="border:.5px solid var(--b1);margin:12px 0"><h2 class="mh2">B2 — Agendamento</h2><p class="mp"><strong>Regra:</strong> Nenhum agendamento é confirmado sem registo no CRM.</p><p class="mp">Consulta paga: "A consulta tem o valor de X€, e o pagamento é feito antecipadamente. Posso enviar o IBAN / MBWay para efectuar agora?"</p><p class="mp">Confirmação 24h antes: "Olá [Nome], confirmando o seu atendimento amanhã, dia [data], às [hora]. Pode confirmar a presença?"</p><hr style="border:.5px solid var(--b1);margin:12px 0"><h2 class="mh2">B3 — Follow-up e Pós-venda</h2><p class="mp">Follow-up: "Olá [Nome], quero apenas confirmar se recebeu as informações sobre o serviço de [nome]. Posso ajudá-lo(a) ou prefere que envie novamente os detalhes?"</p><p class="mp">Pós-venda: "Confirmamos que o seu processo de [nome] foi concluído com sucesso. Obrigado pela confiança."</p><p class="mp">Avaliação Google: "Se ficou satisfeito, ficaremos muito gratos se puder deixar a sua opinião no Google. Segue o link: [link]."</p><hr style="border:.5px solid var(--b1);margin:12px 0"><h2 class="mh2">B4 — Situações Sensíveis e Reclamações</h2><p class="mp"><strong>Regra fundamental:</strong> Nunca discutir, justificar ou argumentar no calor do momento. Acalmar, registar e encaminhar correctamente.</p><p class="mp">Cliente irritado: "Compreendo que está insatisfeito. Pode contar-me o que aconteceu, para que possamos resolver da melhor forma?"</p><p class="mp">Ameaça de reclamação: "Compreendo, [Nome]. O seu caso será avaliado pela direcção. Registo agora o ocorrido e envio para análise da Dra. Ana / Sr. Danilo."</p>`},
m5:{t:"Módulo 5 — CRM e Funis",cap:"Manual Operacional",c:`<div class="mh1">Módulo 5 — CRM, Funis e Onboarding</div><h2 class="mh2">Princípios do CRM</h2><ul class="mul"><li>Todo cliente deve estar registado no CRM.</li><li><strong>Cliente fora do CRM não existe para efeitos operacionais.</strong></li><li>CRM desactualizado é considerado falha de processo.</li></ul><h2 class="mh2">Funis por Unidade</h2><p class="mp">Funil Albufeira (Gabriela) e Funil Faro (Dayane). Cada coordenadora é responsável pelo funil da sua unidade.</p><h2 class="mh2">Etapas do Funil</h2><ul class="mul"><li><strong>1. Leads de Entrada</strong> — sem interacção ainda</li><li><strong>2. Primeiro Contacto</strong> — criar empatia, entender problema. Follow-ups: 24h|48h|96h|144h</li><li><strong>3. Qualificação</strong> — entender necessidade. Situações complexas → consultoria</li><li><strong>4. Apresentação</strong> — enviar mensagem pronta ou PDF</li><li><strong>5. Proposta</strong> — preencher valor e serviço. Follow-ups: 3h|24h|48h|96h|144h</li></ul><h2 class="mh2">SOPs detalhados</h2><p class="mp">Os procedimentos operacionais detalhados do CRM e onboarding estão no <strong>Anexo C</strong> abaixo.</p>`},
c_crm:{t:"Anexo C — CRM e Onboarding",cap:"Manual Operacional",c:`<div class="mh1">Anexo C — CRM, Funis e Onboarding</div><h2 class="mh2">C1 — Triagem de Clientes</h2><p class="mp">Obter obrigatoriamente: nome completo, contacto telefónico, necessidade principal. Sem estes dados, não avançar. Todo contacto gera registo no CRM.</p><hr style="border:.5px solid var(--b1);margin:12px 0"><h2 class="mh2">C2 — Funil de Vendas</h2><ul class="mul"><li><strong>Leads de Entrada</strong> — verificar nome, corrigir se necessário</li><li><strong>Primeiro Contacto</strong> — criar empatia, sem orientar. Follow-ups: 24h|48h|96h|144h</li><li><strong>Qualificação</strong> — situações complexas → consultoria. Não enviar lista de documentos.</li><li><strong>Apresentação</strong> — mensagem pronta ou PDF</li><li><strong>Proposta</strong> — preencher valor e serviço. Follow-ups: 3h|24h|48h|96h|144h</li></ul><hr style="border:.5px solid var(--b1);margin:12px 0"><h2 class="mh2">C3 — Pré-Onboarding</h2><p class="mp">Responsável: exclusivamente quem realizou a venda. Etapas: confirmar nome → solicitar documentos (follow-ups: 24h|72h|168h) → verificar procuração → organizar pasta iCloud → validação final. Falhas são responsabilidade de quem vendeu. O jurídico não corrige — devolve.</p><hr style="border:.5px solid var(--b1);margin:12px 0"><h2 class="mh2">C4 — Onboarding Administrativo</h2><p class="mp">Etapas: Aguardando Início → Agendado → Em Andamento. Qualquer coordenadora pode avançar — territorialidade não se sobrepõe à eficiência.</p><hr style="border:.5px solid var(--b1);margin:12px 0"><h2 class="mh2">C5 — Onboarding Jurídico</h2><p class="mp">Só as coordenadoras movem clientes para o jurídico. Todos os documentos devem estar completos. A Dra. Ana não recebe chamadas directas nem atendimento inicial.</p>`},
m6:{t:"Módulo 6 — Org. Documental",cap:"Manual Operacional",c:`<div class="mh1">Módulo 6 — Organização Documental Padrão</div><h2 class="mh2">Regra Geral</h2><p class="mp">Todos os documentos devem ser: organizados na raiz da pasta do cliente, renomeados antes de arquivar, guardados na pasta correcta, registados no CRM quando relevantes. <strong>Não é permitido guardar documentos com nomes genéricos ou automáticos.</strong></p><h2 class="mh2">Padrão de Nomenclatura</h2><p class="mp">Formato: <strong>[Nome do Documento] - [Sigla do País]</strong> (obrigatório se não for Portugal). Os nomes padronizados detalhados estão no Anexo D abaixo.</p><h2 class="mh2">Subpastas para Serviços Complexos</h2><p class="mp">Serviços jurídicos ou complexos exigem subpasta com o nome do serviço dentro da pasta do cliente. Exemplo: João Silva → subpasta "Nacionalidade" → documentos específicos desse processo.</p>`},
anexo_d:{t:"Anexo D — Nomenclatura",cap:"Manual Operacional",c:`<div class="mh1">Anexo D — Padrão de Nomenclatura Documental</div><p class="mp"><strong>Princípio geral: clareza imediata.</strong> Qualquer colaborador deve identificar o conteúdo de um ficheiro apenas pelo nome.</p><h2 class="mh2">Regra de Ouro</h2><p class="mp">O nome do cliente consta exclusivamente no nome da pasta principal. Os ficheiros não devem conter o nome do cliente.</p><h2 class="mh2">Formato Obrigatório</h2><p class="mp"><strong>[Nome do Documento] - [Sigla do País]</strong> (obrigatório se não for Portugal)</p><h2 class="mh2">Exemplos Correctos</h2><ul class="mul"><li>Certidão Nascimento BR.pdf</li><li>Não Dívidas - AT.pdf</li><li>Procuração - AIMA.pdf</li><li>Passaporte.pdf (Portugal — sem sigla)</li><li>Passaporte - Cópia Integral.pdf</li><li>Título Residência.pdf</li><li>Registo Criminal.pdf</li><li>Contrato Trabalho.pdf</li></ul><h2 class="mh2">Proibido</h2><ul class="mul"><li>foto.jpg / document.pdf / scan001.pdf</li><li>João Silva - Passaporte.pdf (nome do cliente no ficheiro)</li></ul>`},
anexo_e:{t:"Anexo E — Tabela de Preços",cap:"Manual Operacional",c:`<div class="mh1">Anexo E — Tabela Geral de Preços</div><p class="mp">A tabela de preços está disponível no ficheiro oficial Anexo E. Os preços de todos os serviços estão também visíveis nas fichas do catálogo de Serviços.</p><div style="background:#FEF3C7;border-radius:7px;padding:10px 12px;font-size:11px;color:#78350F;margin-top:8px">⚠️ <strong>Regra operacional:</strong> Todos os valores devem ser consultados exclusivamente nos documentos oficiais da Direcção. É proibido perguntar valores a colegas como fonte principal.</div><h2 class="mh2">Resumo por Família</h2><ul class="mul"><li><strong>AIMA</strong> — €15 (certidões) a €250 (defesa audiência)</li><li><strong>AT – Finanças</strong> — €15 (certidões) a €80 (NIF, abertura atividade)</li><li><strong>Segurança Social</strong> — €15 (certidões) a €120 (NISS)</li><li><strong>IMT</strong> — €15 (certidões) a €400 (troca carta UE completo)</li><li><strong>Docs. Brasil</strong> — €20 (antecedentes) a €150 (certidão + apostila)</li><li><strong>Jurídico</strong> — €20 (autenticação) a €1.400 (divórcio transcrição)</li><li><strong>Contabilidade</strong> — €65/mês (não organizada) a €185/mês (empresa)</li><li><strong>Outros</strong> — €20 (2ª via) a €450/ano (domicílio fiscal corporativo)</li></ul>`},
principios:{t:"Princípios de Conduta",cap:"Manual Operacional",c:`<div class="mh1">Princípios Gerais de Conduta e Qualidade</div><ul class="mul"><li><strong>Qualidade acima de Velocidade</strong> — quando houver dúvida, confirma antes de responder.</li><li><strong>Honestidade e Responsabilidade</strong> — não vendemos a qualquer custo. Oferecemos o que o cliente precisa.</li><li><strong>Autonomia com Responsabilidade</strong> — cada colaborador é responsável pelas decisões dentro do seu âmbito.</li><li><strong>Comunicação Clara e Registada</strong> — o CRM é a memória oficial. Informação não registada é inexistente.</li><li><strong>Empatia e Postura Profissional</strong> — os clientes podem estar inseguros ou fragilizados. Postura sempre respeitosa e calma.</li><li><strong>Organização como Valor</strong> — organização e cumprimento de processos não são opcionais.</li><li><strong>Crescimento Conjunto</strong> — identificar falhas, corrigir erros e sugerir melhorias faz parte do trabalho.</li></ul>`},
cancelamento:{t:"Política de Cancelamento",cap:"Políticas",c:`<div class="mh1">Política de Cancelamento e Reembolso</div><h2 class="mh2">1. Natureza dos Serviços</h2><p class="mp">A SEVEN Services presta serviços de meio. Não é possível garantir resultados, prazos ou decisões de entidades públicas. O pagamento remunera o tempo, análise, disponibilidade e estrutura operacional.</p><h2 class="mh2">2. Cancelamento Antes do Início</h2><p class="mp">Reembolso parcial com <strong>retenção de 30%</strong>. Considera-se início qualquer actividade preparatória: análise do caso, solicitação de documentos, criação de pasta, elaboração de procuração.</p><h2 class="mh2">3. Cancelamento Após o Início</h2><p class="mp"><strong>Após o início do serviço, não há direito a reembolso, total ou parcial.</strong></p><h2 class="mh2">4. Validade de Serviços Não Iniciados</h2><p class="mp">Serviços pagos e não iniciados por falta de documentação do cliente têm validade máxima de <strong>90 dias</strong>. Findo o prazo, o serviço é encerrado automaticamente sem reembolso. Retomada exige nova contratação.</p><h2 class="mh2">5. Custos Externos</h2><p class="mp">Taxas, emolumentos ou valores pagos a entidades públicas <strong>não são reembolsáveis em nenhuma circunstância.</strong></p>`},
kommo_crm:{t:"Kommo — CRM",cap:"Manual Operacional",c:`<div class="mh1">Kommo — CRM (Guia completo)</div><p class="mp">O Kommo é o CRM oficial da SEVEN. Todos os leads, clientes e processos passam por aqui. <strong>Cliente fora do CRM não existe para efeitos operacionais.</strong></p><h2 class="mh2">1. Funis por unidade</h2><ul class="mul"><li><strong>Funil Albufeira</strong> — gerido pela Coordenadora Gabriela</li><li><strong>Funil Faro</strong> — gerido pela Coordenadora Dayane</li><li><strong>Funil Jurídico</strong> — gerido pela Dra. Ana, alimentado pelas coordenadoras</li></ul><h2 class="mh2">2. Etapas do funil de vendas</h2><ol class="mul"><li><strong>Leads de Entrada</strong> — verificar nome, corrigir tipos, classificar origem (Instagram, site, indicação)</li><li><strong>Primeiro Contacto</strong> — criar empatia, perceber problema. Follow-ups: 24h · 48h · 96h · 144h</li><li><strong>Qualificação</strong> — identificar se é serviço simples ou requer consultoria. Não enviar listas de documentos ainda.</li><li><strong>Apresentação</strong> — enviar mensagem pronta ou PDF institucional com valores</li><li><strong>Proposta</strong> — preencher valor e serviço no cartão. Follow-ups: 3h · 24h · 48h · 96h · 144h</li><li><strong>Pagamento</strong> — registar método e comprovativo. Sem comprovativo, não avança.</li><li><strong>Onboarding administrativo / jurídico</strong> — conforme tipo de serviço</li></ol><h2 class="mh2">3. Regras obrigatórias de registo</h2><ul class="mul"><li>Todo contacto (presencial, chamada, WhatsApp, Instagram) gera lead no Kommo</li><li>Campo <strong>necessidade principal</strong> tem de estar preenchido na triagem</li><li>Pagamentos, procurações e documentos principais anexados ao cartão</li><li>Notas no campo de comentários em formato breve: acção, resultado, próximo passo</li></ul><h2 class="mh2">4. Follow-ups</h2><p class="mp">A Kommo tem tarefas automáticas. Se a automação não disparou, a coordenadora deve criar a tarefa manualmente. <strong>Nenhum lead fica sem follow-up definido.</strong></p><h2 class="mh2">5. Templates</h2><p class="mp">Templates oficiais estão disponíveis em <em>Serviços</em> → abrir o serviço → aba <strong>Templates</strong>. Copiar e personalizar apenas o nome e o serviço.</p><h2 class="mh2">6. Quando reabrir um cartão</h2><p class="mp">Cartões fechados como <em>perdidos</em> só podem ser reabertos mediante contacto real do cliente — nunca por iniciativa da coordenadora.</p>`},
dicas_mac:{t:"Mac OS — Dicas",cap:"Manual Operacional",c:`<div class="mh1">Mac OS — Dicas essenciais para a equipa</div><p class="mp">Todos os Macs da SEVEN estão configurados com perfil corporativo. Estas dicas aceleram o dia-a-dia.</p><h2 class="mh2">1. Atalhos essenciais</h2><ul class="mul"><li><strong>⌘+C / ⌘+V</strong> — copiar / colar</li><li><strong>⌘+Espaço</strong> — Spotlight (pesquisa universal)</li><li><strong>⌘+Tab</strong> — alternar entre aplicações</li><li><strong>⌘+W</strong> — fechar separador · <strong>⌘+Q</strong> — sair da app</li><li><strong>⌘+Shift+3</strong> — captura ecrã inteiro · <strong>⌘+Shift+4</strong> — capturar área</li><li><strong>⌘+Shift+5</strong> — gravar ecrã</li><li><strong>Control+⌘+Espaço</strong> — painel de emojis</li></ul><h2 class="mh2">2. Organização de janelas</h2><ul class="mul"><li>Arrastar janela para canto superior da tela: abre Mission Control (múltiplos desktops)</li><li><strong>Control+→</strong> / <strong>Control+←</strong> — navegar entre desktops</li><li>Clique duplo na barra superior da janela: maximiza sem tapar a dock</li></ul><h2 class="mh2">3. iCloud & Ficheiros</h2><ul class="mul"><li>Pastas de clientes sempre no iCloud Drive → pasta <strong>SEVEN</strong></li><li>Não guardar ficheiros no Ambiente de Trabalho — sincronizam mas ficam desorganizados</li><li>Usar <strong>Tags</strong> do Finder (Urgente, Pendente, Concluído) nos processos activos</li></ul><h2 class="mh2">4. Segurança</h2><ul class="mul"><li><strong>Control+⌘+Q</strong> — bloquear o ecrã ao sair da secretária</li><li>Nunca instalar apps fora da App Store sem autorização da direcção</li><li>Passwords nas credenciais do Perfil — nunca em notas soltas</li></ul><h2 class="mh2">5. Atendimento telefónico & vídeo</h2><ul class="mul"><li>Teams e FaceTime — microfone testado no início de cada turno</li><li>Barra de menu: ícone de som → seleccionar auricular antes de atender</li><li>Em chamadas externas, silenciar notificações com <strong>Focus (Lua)</strong></li></ul>`}
};

GR:`<div class="mh1">Anexo A1 — Gabriela Ramos</div><p class="mp" style="background:#D1FAE5;border-radius:7px;padding:8px 12px;color:#065F46;font-size:11px">🔒 Este documento é confidencial — visível apenas para ti.</p><h2 class="mh2">Função Geral</h2><p class="mp">A Coordenadora de Processos é responsável por garantir que todos os atendimentos administrativos, processos, documentos e fluxos internos sejam executados de forma organizada, eficiente e padronizada. É a ponte entre a receção, direção, contabilidade e jurídico.</p><h2 class="mh2">A) Gestão de CRM</h2><ul class="mul"><li>Criar e atualizar leads no CRM com dados completos e corretos</li><li>Registar pagamentos, métodos utilizados e anexar comprovativos</li><li>Encaminhar correctamente leads jurídicos para a Dra. Ana</li><li><strong>Responsabilidade-chave: ZERO clientes sem atualização no CRM</strong></li></ul><h2 class="mh2">B) Receção / Atendimento</h2><ul class="mul"><li>Atender presencialmente e online com postura profissional</li><li>Realizar triagem e identificar o serviço correcto</li><li>Atender e fechar serviços rápidos (Finanças, IMT, SS, etc.)</li><li>Confirmar pagamentos e emitir faturas/recibos</li></ul><h2 class="mh2">C) Operação Administrativa</h2><ul class="mul"><li>Organizar e manter pastas no iCloud com nomes padronizados</li><li>Verificar e validar documentos recebidos dos clientes</li><li>Controlar prazos internos e externos de processos</li></ul><h2 class="mh2">Limites — NÃO FAZ</h2><ul class="mul"><li>Não realizar consultoria jurídica</li><li>Não definir preços fora da tabela oficial</li><li>Não tomar decisões estratégicas</li><li>Não alterar dados financeiros sem autorização</li></ul>`,
DS:`<div class="mh1">Anexo A2 — Dayane Silva</div><p class="mp" style="background:#D1FAE5;border-radius:7px;padding:8px 12px;color:#065F46;font-size:11px">🔒 Este documento é confidencial — visível apenas para ti.</p><h2 class="mh2">Função Geral</h2><p class="mp">A Coordenadora de Processos de Faro é responsável pelo funcionamento diário da loja de Faro. Actua como representante directa da SEVEN Services em Faro, mantendo o padrão de qualidade definido pela direcção.</p><h2 class="mh2">A) CRM — Funil Faro</h2><ul class="mul"><li>Criar e atualizar leads no CRM com dados completos</li><li>Meta operacional: nenhum atendimento presencial fica sem lead criado</li><li>Registar dúvidas de serviços para análise da sede (Albufeira)</li><li>Encaminhar correctamente leads jurídicos para a Dra. Ana</li></ul><h2 class="mh2">B) Receção / Atendimento</h2><ul class="mul"><li>Atender presencialmente e online com postura profissional</li><li>Fechar serviços simples (Finanças, IMT, SS, etc.)</li><li>Manter comunicação ativa com a equipa de Albufeira</li></ul><h2 class="mh2">Limites — NÃO FAZ</h2><ul class="mul"><li>Não realizar consultoria jurídica</li><li>Não definir preços fora da tabela oficial</li><li>Não tomar decisões estratégicas</li></ul>`,
AK:`<div class="mh1">Anexo A3 — Ana Kathlyn</div><p class="mp" style="background:#D1FAE5;border-radius:7px;padding:8px 12px;color:#065F46;font-size:11px">🔒 Este documento é confidencial — visível apenas para ti.</p><h2 class="mh2">Função Geral</h2><p class="mp">A Responsável Jurídica é a profissional autorizada pela Ordem dos Advogados para representar juridicamente a empresa, realizar consultas jurídicas, elaborar peças e acompanhar processos.</p><h2 class="mh2">A) CRM — Onboarding Jurídico</h2><ul class="mul"><li>Atualizar exclusivamente as etapas jurídicas dos clientes sob sua responsabilidade</li><li>Registar peças, minutas, pareceres e documentos jurídicos no CRM</li><li>Manter comunicação com Gabriela sobre estados, pendências e necessidades</li></ul><h2 class="mh2">B) Atendimento Jurídico</h2><ul class="mul"><li>Realizar consultas jurídicas presenciais ou online</li><li>Avaliar viabilidade de processos judiciais e administrativos</li><li>Fechar serviços jurídicos de ticket elevado</li></ul><h2 class="mh2">Limites — NÃO FAZ / NÃO RECEBE</h2><ul class="mul"><li>Não organiza pastas ou ficheiros no iCloud</li><li>Não presta atendimento inicial</li><li>Não executa processos administrativos simples</li><li>Não recebe chamadas directas sem agendamento</li></ul><h2 class="mh2">Regras da Ordem dos Advogados</h2><ul class="mul"><li>Mantém autonomia técnica total sobre a orientação jurídica</li><li>O CEO não interfere na elaboração de peças ou decisões jurídicas</li><li>Toda comunicação jurídica formal deve ser assinada pela advogada</li></ul>`,

// ── Hashing de palavras-passe (PBKDF2-SHA-256 via Web Crypto, sem dependências) ──
async function hashPassword(pw,iterations){
  const iters=iterations||100000;
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveBits"]);
  const bits=await crypto.subtle.deriveBits({name:"PBKDF2",salt:salt,iterations:iters,hash:"SHA-256"},km,256);
  const b64=b=>btoa(String.fromCharCode.apply(null,new Uint8Array(b)));
  return "pbkdf2$"+iters+"$"+b64(salt)+"$"+b64(bits);
}
async function verifyPasswordHash(pw,stored){
  if(!pw||!stored||typeof stored!=="string")return false;
  const parts=stored.split("$");
  if(parts.length!==4||parts[0]!=="pbkdf2")return false;
  const iters=parseInt(parts[1],10);
  let salt;try{salt=Uint8Array.from(atob(parts[2]),c=>c.charCodeAt(0));}catch(e){return false;}
  try{
    const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveBits"]);
    const bits=await crypto.subtle.deriveBits({name:"PBKDF2",salt:salt,iterations:iters,hash:"SHA-256"},km,256);
    const hashB64=btoa(String.fromCharCode.apply(null,new Uint8Array(bits)));
    // comparação de tempo constante
    if(hashB64.length!==parts[3].length)return false;
    let diff=0;for(let i=0;i<hashB64.length;i++)diff|=hashB64.charCodeAt(i)^parts[3].charCodeAt(i);
    return diff===0;
  }catch(e){return false;}
}
// Verifica a password de um utilizador do fallback: 1) password local definida
// pelo próprio (Meu Perfil), 2) hash do source. Devolve Promise<boolean>.

async function resolveSuggestion(id,status,note){
  if(!isAdminUser())return;
  if(!sbConnected){toast("Supabase indisponível");return;}
  try{
    const sg=suggestionsList.find(x=>x.id===id);
    const patch={status:status,admin_note:note||""};
    if(status==="done"||status==="rejected"||status==="accepted"){patch.resolved_at=new Date().toISOString();patch.resolved_by=currentUser.code;}
    await SB.patch("suggestions","id=eq."+id,patch);
    if(sg){
      const sm=sugStatusMeta(status);
      await notifyUser(sg.user_code,"suggestion","Sugestão "+sm[1].replace(/^\S+\s/,""),"A tua sugestão foi "+sm[1].replace(/^\S+\s/,"").toLowerCase()+"."+(note?" Nota: "+note:""),"suggestion:"+id);
    }
    toast("✓ Actualizado");await loadSuggestions();render();
  }catch(e){toast("Erro: "+e.message);}
}
function promptResolveSuggestion(id,status){
  const labels={accepted:"Justificação da aceitação (opcional):",rejected:"Motivo da recusa (obrigatório):",done:"Resumo do que foi feito (opcional):"};
  const note=prompt(labels[status]||"Nota:","");
  if(status==="rejected"&&!note){toast("Motivo obrigatório");return;}
  if(note===null)return;
  resolveSuggestion(id,status,note);
}

async function seedDocTemplates(){
  if(!isAdminUser()){toast("Apenas admin");return;}
  if(!sbConnected){toast("Supabase indisponível");return;}
  const st=document.getElementById("doc-seed-status");
  try{
    for(let i=0;i<DOC_TEMPLATE_SEEDS.length;i++){
      const t=DOC_TEMPLATE_SEEDS[i];
      if(st)st.innerHTML='<span style="color:var(--t2)">A sincronizar... '+(i+1)+'/'+DOC_TEMPLATE_SEEDS.length+'... ('+t.doc_key+')</span>';
      const row={
        doc_key:t.doc_key,type:t.type,title:t.title,description:t.description||"",
        letterhead:t.letterhead||"seven",body:t.body,
        clauses:t.clauses||[],fields:t.fields||[],

        updated_by:(currentUser&&currentUser.code)||""
      };
      const r=await fetch(SB_URL+"/rest/v1/document_templates?on_conflict=doc_key",{method:"POST",headers:sbHeaders({"Prefer":"return=representation,resolution=merge-duplicates"}),body:JSON.stringify([row])});

        let detail="";try{detail=(await r.text()).slice(0,200);}catch(e){}

        toast(msg);return;
      }
    }
    if(st)st.innerHTML='<span style="background:#D1FAE5;color:#065F46;border-radius:10px;padding:3px 10px;font-size:11px;font-weight:700">✓ '+DOC_TEMPLATE_SEEDS.length+' modelos sincronizados</span>';

    if(st)st.innerHTML='<span style="background:#FEE2E2;color:#991B1B;border-radius:10px;padding:3px 10px;font-size:11px;font-weight:700">Erro: '+esc((e.message||"falha").slice(0,80))+'</span>';

function docSampleData(buf){
  const fields=Array.isArray(buf&&buf.fields)?buf.fields:[];
  const sample={};
  fields.forEach(f=>{
    if(!f||!f.key)return;
    if(f.default!=null&&f.default!==""){sample[f.key]=f.default;}
    else if(f.type==="checkbox"){sample[f.key]=false;}
    else if(/nome/i.test(f.key))sample[f.key]="João Silva (TESTE)";
    else if(/data|nasc|valid/i.test(f.key))sample[f.key]="01/01/2025";
    else if(/nif|num_doc|cpf/i.test(f.key))sample[f.key]="123456789";
    else if(/local/i.test(f.key))sample[f.key]="Albufeira";
    else if(/morada/i.test(f.key))sample[f.key]="Rua Exemplo, 1, Albufeira";
    else if(/valor/i.test(f.key))sample[f.key]="100";
    else sample[f.key]="("+(f.label||f.key)+")";
  });
  return sample;
}
function buildDocPreviewHtml(buf){
  if(!buf||!buf.body)return '<div style="color:var(--t3);font-size:12px;text-align:center;padding:40px 0">Sem corpo para pré-visualizar.</div>';

    const bodyHtml=bodyMdToHtml(resolved);

}

async function saveDocTemplate(){
  if(!isAdminUser()){toast("Apenas admin");return;}
  if(!sbConnected){toast("Supabase indisponível");return;}
  if(!docEditBuf){toast("Sem dados");return;}
  const b=docEditBuf;
  if(!b.doc_key||!/^[a-z0-9_-]+$/i.test(b.doc_key)){toast("doc_key inválida (use a-z, 0-9, _, -)");return;}
  if(!b.title){toast("Título obrigatório");return;}
  if(!b.body){toast("Corpo do documento obrigatório");return;}
  if(b.type!=="procuracao"&&b.type!=="contrato"){toast("Tipo inválido");return;}
  if(["empresa","advogada","brasil"].indexOf(b.letterhead)<0)b.letterhead="empresa";
  const row={
    doc_key:b.doc_key,type:b.type,title:b.title,description:b.description||"",
    letterhead:b.letterhead,body:b.body,
    fields:Array.isArray(b.fields)?b.fields:[],
    clauses:Array.isArray(b.clauses)?b.clauses:[],
    active:!!b.active,sort_order:b.sort_order||99,
    updated_by:(currentUser&&currentUser.code)||""
  };
  try{
    const r=await fetch(SB_URL+"/rest/v1/document_templates?on_conflict=doc_key",{method:"POST",headers:sbHeaders({"Prefer":"return=representation,resolution=merge-duplicates"}),body:JSON.stringify([row])});
    if(!r.ok){const d=await r.text().catch(()=>"");throw new Error("Status "+r.status+": "+d.slice(0,180));}
    toast("✓ Modelo guardado");
    await loadDocTemplates();
    docEditing=null;docEditBuf=null;page="docmodels";renderSide();render();
  }catch(e){toast("Erro: "+e.message);}
}

async function deleteDocTemplate(docKey){
  if(!isAdminUser())return;
  const ans=prompt('Acção irreversível. Para apagar o modelo "'+docKey+'", escreve APAGAR:');
  if(ans===null)return;
  if(ans.trim().toUpperCase()!=="APAGAR"){toast("Cancelado — confirmação não coincide");return;}
  try{await SB.del("document_templates","doc_key=eq."+docKey);delete sbDocTemplates[docKey];toast("✓ Apagado");render();}
  catch(e){toast("Erro: "+e.message);}
}

function loadPdfJs(){
  return new Promise((resolve,reject)=>{
    if(window.pdfjsLib){resolve(window.pdfjsLib);return;}
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=()=>{
      if(!window.pdfjsLib){reject(new Error("pdfjsLib não carregou"));return;}
      window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      resolve(window.pdfjsLib);
    };
    s.onerror=()=>reject(new Error("Falha ao carregar PDF.js"));
    document.head.appendChild(s);
  });
}
async function listStorageBucket(bucket){
  try{
    const r=await fetch(SB_URL+"/storage/v1/object/list/"+bucket,{method:"POST",headers:sbHeaders({"Content-Type":"application/json"}),body:JSON.stringify({prefix:"",limit:30,offset:0,sortBy:{column:"name",order:"asc"}})});
    if(!r.ok)return {ok:false,status:r.status,items:null};
    const items=await r.json();
    if(Array.isArray(items))return {ok:true,items};
    return {ok:false,status:r.status,items:null,message:(items&&items.message)||""};
  }catch(e){return {ok:false,error:e.message,items:null};}
}
async function fetchCaePdfBlob(bucket,fileName){
  const publicUrl=SB_URL+"/storage/v1/object/public/"+bucket+"/"+encodeURIComponent(fileName);
  const authUrl=SB_URL+"/storage/v1/object/"+bucket+"/"+encodeURIComponent(fileName);
  let lastStatus=0,lastErr="";
  try{
    const r=await fetch(publicUrl);
    if(r.ok)return {buf:await r.arrayBuffer(),url:publicUrl,via:"public"};
    lastStatus=r.status;try{lastErr=(await r.text()).slice(0,200);}catch(e){}
  }catch(e){lastErr=e.message;}
  try{
    const r=await fetch(authUrl,{headers:sbHeaders()});
    if(r.ok)return {buf:await r.arrayBuffer(),url:authUrl,via:"authenticated"};
    lastStatus=r.status;try{lastErr=(await r.text()).slice(0,200);}catch(e){}
  }catch(e){lastErr=e.message;}
  const list=await listStorageBucket(bucket);
  let hint="";
  if(list.ok&&Array.isArray(list.items)){
    const names=list.items.map(i=>i.name);
    if(!names.length)hint=" · bucket '"+bucket+"' está vazio";
    else if(names.indexOf(fileName)<0)hint=" · ficheiros no bucket: "+names.slice(0,8).join(", ")+(names.length>8?"…":"")+" (nenhum chamado '"+fileName+"')";
    else hint=" · '"+fileName+"' existe no bucket mas não é acessível. Torna o bucket público em Supabase → Storage → "+bucket+" → Make public, OU adiciona política RLS de select para a anon key.";
  } else {
    hint=" · não foi possível listar bucket '"+bucket+"' (status "+(list.status||"?")+"). Confirma que o bucket existe.";
  }
  throw new Error("PDF inacessível (status "+lastStatus+")"+hint);
}
async function extractCaePdfFromStorage(){
  const bucket="agent-docs",fileName="cae.pdf";
  const pdfjs=await loadPdfJs();
  const st=document.getElementById("ia-cae-status");
  if(st)st.innerHTML='<span style="color:var(--t2)">A obter PDF do Storage…</span>';
  const fetched=await fetchCaePdfBlob(bucket,fileName);
  const pdf=await pdfjs.getDocument({data:fetched.buf}).promise;
  const pages=[];
  for(let i=1;i<=pdf.numPages;i++){
    if(st&&i%5===1)st.innerHTML='<span style="color:var(--t2)">A extrair página '+i+'/'+pdf.numPages+'…</span>';
    const p=await pdf.getPage(i);
    const tc=await p.getTextContent();
    pages.push(tc.items.map(it=>it.str).join(" "));
  }
  const text=cleanPdfText(pages.join("\n"));
  if(!text)throw new Error("PDF tem "+pdf.numPages+" páginas mas sem texto extraível (provável PDF só-imagem — requer OCR)");
  if(st)st.innerHTML='<span style="color:var(--t2)">A guardar em ai_context_docs…</span>';
  const row={key_:"cae_portugal",title:"Tabela CAE — PDF oficial",content:text,file_url:fetched.url,updated_by:(currentUser&&currentUser.code)||""};
  const up=await fetch(SB_URL+"/rest/v1/ai_context_docs?on_conflict=key_",{method:"POST",headers:sbHeaders({"Prefer":"return=representation,resolution=merge-duplicates"}),body:JSON.stringify([row])});
  if(!up.ok){let d="";try{d=(await up.text()).slice(0,200);}catch(e){}throw new Error("Falha ao guardar em ai_context_docs (status "+up.status+") "+d);}
  sbAiContextDocs=sbAiContextDocs||{};
  sbAiContextDocs.cae_portugal={title:row.title,content:row.content,file_url:row.file_url};
  return {pages:pdf.numPages,chars:text.length,text:text,via:fetched.via};
}

function parsePaymentDetails(raw){
  const out={albufeira:"",faro:""};
  if(!raw)return out;
  if(typeof raw==="object"&&raw!==null){return{albufeira:raw.albufeira||"",faro:raw.faro||""};}
  const s=String(raw).trim();
  if(!s)return out;
  if(s.startsWith("{")){try{const j=JSON.parse(s);return{albufeira:j.albufeira||"",faro:j.faro||""};}catch(e){}}
  out.albufeira=s;return out;
}
function formatPaymentDetails(det){
  const parts=[];
  if(det.albufeira)parts.push("Albufeira: "+det.albufeira);
  if(det.faro)parts.push("Faro: "+det.faro);
  return parts.join(" · ");
}
