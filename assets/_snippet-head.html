<!--
===================================================================
SNIPPET PARA COLAR NO <head> DO index.html (ou layout principal)
===================================================================
Copie todo o bloco abaixo e cole dentro da tag <head>.
Este snippet contém:
  - Favicon (multi-tamanho)
  - Apple touch icon (iOS)
  - Manifest PWA (Android/Chrome desktop)
  - Meta tags para instalação como app
  - Meta tags Open Graph (partilha WhatsApp/LinkedIn/FB)
===================================================================
-->

<!-- Título e descrição -->
<title>SEVEN Services — Backoffice</title>
<meta name="description" content="Backoffice interno da SEVEN Services - Assessoria & Consultoria em Portugal.">

<!-- Favicon (navegador) -->
<link rel="icon" type="image/x-icon" href="/assets/logos/favicons/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/logos/favicons/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/logos/favicons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/assets/logos/favicons/favicon-48x48.png">

<!-- Apple (iOS home screen) -->
<link rel="apple-touch-icon" sizes="180x180" href="/assets/logos/favicons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SEVEN">

<!-- PWA Manifest (Android / Chrome desktop) -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0A1C44">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="SEVEN Services">

<!-- Open Graph (preview ao partilhar em redes sociais) -->
<meta property="og:type" content="website">
<meta property="og:title" content="SEVEN Services — Assessoria & Consultoria">
<meta property="og:description" content="Assessoria administrativa, jurídica, fiscal e de imigração em Portugal.">
<meta property="og:image" content="/assets/social/og-image.jpg">
<meta property="og:locale" content="pt_PT">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="SEVEN Services">
<meta name="twitter:description" content="Assessoria & Consultoria em Portugal.">
<meta name="twitter:image" content="/assets/social/og-image.jpg">
